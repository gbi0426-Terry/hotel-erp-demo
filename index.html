    @media(max-width:1080px){.app{grid-template-columns:1fr}.sidebar{position:static;height:auto;padding:12px}.nav{display:flex;overflow-x:auto;padding-bottom:4px}.nav button{min-width:180px}.topbar{position:static;align-items:flex-start;flex-direction:column}.toolbar{justify-content:flex-start}.cols4,.cols3,.cols2,.split,.doc-summary,.form-grid{grid-template-columns:1fr}.field.full{grid-column:auto}.role-strip{grid-template-columns:auto 1fr}.role-scope{grid-column:2;text-align:left}table{min-width:760px}}@media(max-width:560px){.content{padding:14px}.topbar{padding:14px}.title h1{font-size:18px}.value{font-size:24px}.head{align-items:flex-start;flex-direction:column}.btn{width:100%}.toolbar,.role-switch{width:100%}.role-switch select{width:100%;min-width:0}.seg{width:100%;overflow-x:auto}.seg button{flex:1;white-space:nowrap}.step{grid-template-columns:30px 1fr}.step button,.step .status{grid-column:2;justify-self:start}.audit-row,.task-row{grid-template-columns:1fr}.task-row>.status{justify-self:start}.process{padding-bottom:8px}.role-strip{grid-template-columns:1fr}.role-scope{grid-column:auto}.role-avatar{display:none}.modal>.head{flex-direction:row}.modal>.head .btn{width:36px;flex:0 0 36px;padding:6px}}

  <style>
    .demo-lanes{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}.demo-lane{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;align-items:center;padding:14px 15px;border:1px solid var(--line);border-radius:8px;background:#fff;box-shadow:var(--shadow)}.demo-lane .role-mark{width:34px;height:34px;border-radius:7px;display:grid;place-items:center;background:#eaf2ff;color:#184f86;font-weight:800}.demo-lane-main{display:grid;grid-template-columns:auto minmax(0,1fr);gap:10px;align-items:center}.demo-lane strong{display:block;font-size:13px}.demo-lane span{display:block;color:var(--muted);font-size:11px;margin-top:3px}.demo-lane-count{text-align:right}.demo-lane-count b{display:block;font-size:20px}.demo-lane .btn{grid-column:1/-1;width:100%}.task-owner{display:inline-flex!important;margin:0 6px 0 0!important;padding:2px 6px;border-radius:5px;background:#edf5ff;color:#184f86!important;font-weight:700}.demo-module-list{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;padding:14px 16px}.demo-module-list button{justify-content:flex-start;text-align:left}.demo-module-list button span{margin-left:auto;color:var(--muted);font-size:11px}
    @media(max-width:1080px){.demo-lanes{grid-template-columns:repeat(2,minmax(0,1fr))}}@media(max-width:560px){.demo-lanes,.demo-module-list{grid-template-columns:1fr}.demo-lane .btn{width:100%}}

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* =========================================================
       IBM Carbon Design System 升級層（純樣式覆蓋，不動 HTML/JS）
       tokens: Gray 10/20/50/70/100, Blue 60 #0f62fe, IBM Plex
       ========================================================= */
    :root{
      --font:'IBM Plex Sans','Noto Sans TC','Microsoft JhengHei',-apple-system,BlinkMacSystemFont,sans-serif;
      --mono:'IBM Plex Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
      --bg:#f4f4f4;--panel:#ffffff;--ink:#161616;--muted:#525252;--line:#e0e0e0;
      --nav:#161616;--blue:#0f62fe;--green:#198038;--amber:#8e6a00;--red:#da1e28;--purple:#6929c4;
      --soft:#f4f4f4;--shadow:none;
    }
    body{font-family:var(--font);-webkit-font-smoothing:antialiased;letter-spacing:0}
    /* 直角化：Carbon 用銳利邊角（狀態標籤/圓點維持圓形） */
    .btn,.card,.metric,.modal,.field input,.field select,.field textarea,.seg,.role-switch,
    .role-strip,.alert,.checkline,.decision label,.step,.demo-lane,.demo-lane .role-mark,
    .doc-summary>div,.process span,.doc-link,.role-only-note,.logo,.no,.role-avatar,.task-owner,.toast,.audit-row{border-radius:0!important}

    /* UI Shell 側欄（Carbon g100 暗色） */
    .sidebar{background:var(--nav);color:#c6c6c6;border-right:1px solid #393939;padding:0}
    .brand{padding:16px;border-bottom:1px solid #393939;margin-bottom:8px}
    .brand strong{color:#f4f4f4;font-weight:600;letter-spacing:.01em}
    .brand span{color:#8d8d8d}
    .logo{background:var(--blue);color:#fff;font-weight:600}
    .nav{padding:0 0 8px;gap:0}
    .nav button{color:#c6c6c6;padding:0 16px;min-height:40px;font-size:13px;letter-spacing:.01em}
    .nav button:hover{background:#262626;color:#fff}
    .nav button.active{background:#393939;color:#fff;box-shadow:inset 3px 0 0 var(--blue)}
    .nav button.active .badge{background:var(--blue);color:#fff}
    .badge{background:#525252;color:#f4f4f4;font-family:var(--mono);font-size:11px;padding:2px 7px}

    /* 頂列 */
    .topbar{background:#fff;border-bottom:1px solid var(--line);backdrop-filter:none}
    .title h1{font-weight:600;letter-spacing:0;color:#161616}
    .title p{color:var(--muted)}

    /* 按鈕（Carbon buttons，直角、Blue 60 主色） */
    .btn{background:#fff;border:1px solid #8d8d8d;color:#161616;font-weight:500;transition:background .11s}
    .btn:hover{background:#e8e8e8}
    .btn.primary{background:var(--blue);border-color:var(--blue);color:#fff}
    .btn.primary:hover{background:#0353e9}
    .btn.green{background:var(--green);border-color:var(--green);color:#fff}
    .btn.green:hover{background:#0e6027}
    .btn.danger{background:#fff;border-color:var(--red);color:var(--red)}
    .btn.danger:hover{background:#fff1f1}
    .btn:focus-visible{outline:2px solid #fff;outline-offset:-4px;box-shadow:0 0 0 2px var(--blue)}

    /* 卡片 / 指標磚（扁平、1px 邊、無陰影） */
    .card{border:1px solid var(--line);box-shadow:none}
    .head{border-bottom:1px solid var(--line)}
    .head h2{font-weight:600}
    .metric{border:1px solid var(--line);box-shadow:none;background:#fff}
    .label{color:var(--muted);font-size:.75rem;letter-spacing:.02em}
    .value{font-family:var(--mono);font-weight:600;letter-spacing:-.01em;color:#161616}

    /* 資料表（Carbon DataTable） */
    th{background:#f4f4f4;color:#525252;font-weight:600;font-size:12px;letter-spacing:.02em;border-bottom:1px solid #e0e0e0}
    td{border-bottom:1px solid #e0e0e0;color:#161616}
    tbody tr:hover td{background:#f4f4f4}
    .statement .total td{background:#f4f4f4;border-top:1px solid #8d8d8d}

    /* 狀態標籤（Carbon Tags，維持圓角膠囊） */
    .status{border-radius:999px;font-weight:500}
    .ok,.status.ok{background:#defbe6;color:#0e6027}
    .st-bad,.status.st-bad{background:#fff1f1;color:#a2191f}
    .st-warn,.status.st-warn{background:#fcefd0;color:#8e6a00}
    .purple,.status.purple{background:#f6f2ff;color:#6929c4}
    .info,.status.info{background:#edf5ff;color:#0043ce}

    /* 輸入框（Carbon text input：填色 + 底線） */
    .field label{color:#525252;font-weight:500}
    .field input,.field select,.field textarea{background:#f4f4f4;border:0;border-bottom:1px solid #8d8d8d;color:#161616}
    .field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--blue);outline-offset:-2px;box-shadow:none;border-bottom-color:transparent}
    .role-switch{border:1px solid #8d8d8d;background:#fff}

    /* 內容切換器 */
    .seg{border:1px solid #8d8d8d}
    .seg button{color:#525252}
    .seg button.active{background:#161616;color:#fff}

    /* 行內通知 / 提示 */
    .alert{border:0;border-left:3px solid #f1c21b;background:#fdf6dd;color:#161616}
    .alert.bad{border-left-color:var(--red);background:#fff1f1;color:#161616}

    /* 對話框 */
    .modal{border:1px solid var(--line);box-shadow:0 2px 6px rgba(0,0,0,.2)}
    .modal .foot{background:#f4f4f4;border-top:1px solid var(--line)}

    /* 其他 Carbon 細節 */
    .role-strip{background:#edf5ff;border:1px solid #d0e2ff}
    .role-avatar{background:#161616}
    .doc-link{background:#edf5ff;border:1px solid #d0e2ff;color:#0043ce;font-family:var(--mono)}
    .doc-link.muted{background:#f4f4f4;border-color:#e0e0e0;color:#6f6f6f}
    .process span{background:#f4f4f4;border:1px solid #e0e0e0}
    .step{background:#fff;border:1px solid #e0e0e0}
    .step.done{border-color:#a7f0ba;background:#defbe6}.step.done .no{background:var(--green)}
    .step.active{border-color:#a6c8ff;background:#edf5ff}
    .no{background:#e0e0e0;color:#161616}
    .toast{background:#161616}
    .task-owner{background:#edf5ff;color:#0043ce!important}
    button:focus-visible,a:focus-visible,input:focus-visible,select:focus-visible{outline:2px solid var(--blue);outline-offset:1px}
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand"><div class="logo">ERP</div><div><strong>飯店 ERP 中台</strong><span>VenueOS 後勤閉環 Demo</span></div></div>
      <nav class="nav" id="nav"></nav>
    </aside>
    <main class="main">
      <header class="topbar">
        <div class="title"><h1 id="pageTitle">飯店 ERP 總覽</h1><p id="pageSub">以公開版模板展示飯店日結、City Ledger、OTA/信用卡、庫存耗用、AP、部門損益與三大報表。</p></div>
        <div class="toolbar"><label class="role-switch"><span>目前身分</span><select id="roleSelect" aria-label="切換操作身分"></select></label><button class="btn" id="resetBtn">重設資料</button><button class="btn primary" id="quickActionBtn">新增請購</button></div>

    function load(){try{return JSON.parse(localStorage.getItem(KEY))||structuredClone(seed)}catch{return structuredClone(seed)}}function save(){localStorage.setItem(KEY,JSON.stringify(state))}function $(id){return document.getElementById(id)}function money(n){return"NT$"+Math.round(n).toLocaleString("zh-TW")}function rev(){return state.cost.reduce((s,x)=>s+x[1],0)}function ota(){return state.cost.reduce((s,x)=>s+x[2],0)}function opCost(){return state.cost.reduce((s,x)=>s+x[3]+x[4]+x[5],0)}function gp(){return rev()-ota()-opCost()}function salary(e){return e[4]=="月薪"?Math.round(e[5]+e[5]/176*1.34*e[7]):Math.round(e[5]*e[6]+e[5]*1.34*e[7])}function payroll(){return state.emp.reduce((s,e)=>s+salary(e),0)}function invVal(){return state.inv.reduce((s,x)=>s+x[3]*x[6],0)}function openAr(){return state.ar.filter(x=>x[7]!="已收款").length}function openAp(){return state.ap.filter(x=>x[5]!="已付款").length}function arAmt(){return state.ar.filter(x=>x[7]!="已收款").reduce((s,x)=>s+x[3],0)}function apAmt(){return state.ap.filter(x=>x[5]!="已付款").reduce((s,x)=>s+x[3],0)}function cash(){return 860000+state.ar.filter(x=>x[7]=="已收款").reduce((s,x)=>s+x[3],0)-state.ap.filter(x=>x[5]=="已付款").reduce((s,x)=>s+x[3],0)-payroll()}function low(){return state.inv.filter(x=>x[3]<x[4])}

iv></div></div>`}

    function plan(){ $("plan").innerHTML=`<div class="grid cols3">${small("第一階段","VenueOS 同步、應收帳款、庫存安全量、飯店 ERP 總覽、三大報表雛形")}${small("第二階段","採購流程、應付帳款、驗收入庫、成本中心、傳票匯出")}${small("第三階段","人事薪資、多館權限、預算控管、正式會計系統串接")}</div><div class="split"><div class="card"><div class="head"><div><h2>客戶需提供資料</h2><p>Demo 後可直接用這份清單跟客戶確認第一期範圍。</p></div></div><div class="list">${state.tasks.map((t,i)=>`<label class="task"><input type="checkbox" ${t[2]?"checked":""} onchange="state.tasks[${i}][2]=!state.tasks[${i}][2];save();render()"><div><strong>${t[0]}</strong><span>${t[1]}</span></div>${t[2]?st("完成"):st("待確認")}</label>`).join("")}</div></div><div class="card pad"><h2 style="font-size:15px;margin:0 0 10px">Demo 話術</h2><p style="margin:0;line-height:1.75">VenueOS 管前台交易、會員與核銷；ERP 管後台閉環。資料進來後會變成應收、發票、收款、庫存扣料、請購、採購、驗收、應付、成本，最後產出損益表、資產負債表與現金流量表。</p></div></div>`}

    function runNext(){let i=state.loopStep;if(i==0)simulateSync(false);if(i==1&&!state.ar.some(x=>x[0]=="AR-260799"))state.ar.unshift(["AR-260799","VenueOS 今日企業月結","企業住宿月結",76200,"2026-07-25",0,"待開立","待開票"]);if(i==2){let x=state.ar.find(x=>x[7]!="已收款");if(x){x[7]="已收款";if(x[6]=="待開立")x[6]="AB12990001"}}if(i==3)consume(false);if(i==4){let x=low()[0]||state.inv[0];reqFrom(x[0],false)}if(i==5){let r=state.req.find(x=>x[5]=="待核准");if(r)advanceReq(r[0]);let p=state.po.find(x=>x[5]!="已驗收");if(p)receivePO(p[0],false)}if(i==6)state.cost[0][4]+=4200;state.loopStep=Math.min(i+1,steps.length);save();render();toast(i>=steps.length?"閉環流程已完成，可查看三大會計報表":steps[i][0]+" 已完成")}

    function procure(){let t=window.procTab||"work",tabs={work:"工作台",store:"部門領料",pr:"PR 請購",source:"比價／PO",receive:"驗收／發票"},pendingStore=state.storeReq.filter(x=>x.status=="待發料").length,pendingPr=state.req.filter(x=>x.status=="待部門主管核准").length,pendingRfq=state.rfq.filter(x=>x.status=="待決選").length,exceptions=state.supplierInv.filter(x=>["數量差異","金額差異"].includes(x.status)).length;let body=t=="store"?procStore():t=="pr"?procPr():t=="source"?procSource():t=="receive"?procReceive():procWork();$("procure").innerHTML=`<div class="grid cols4">${metric("待發料 SR",pendingStore+" 張","中央倉／餐飲倉／工程倉","warn")}${metric("待核准 PR",pendingPr+" 張","預算與部門主管簽核","warn")}${metric("待決選 RFQ",pendingRfq+" 張","三家報價、交期與付款條件","warn")}${metric("比對異常",exceptions+" 張","差異未解前凍結付款","bad","ap")}</div><div class="card pad"><div class="process"><span>部門領料 SR</span><b>→</b><span>庫存不足轉 PR</span><b>→</b><span>簽核與預算</span><b>→</b><span>RFQ 比價</span><b>→</b><span>PO</span><b>→</b><span>GRN 驗收</span><b>→</b><span>Supplier Invoice</span><b>→</b><span>三方比對</span><b>→</b><span>AP／付款</span></div></div><div class="card"><div class="head"><div><h2>飯店採購工作台</h2><p>所有狀態由實際單據動作推進，並保留關聯單號與簽核軌跡。</p></div><div class="seg">${Object.entries(tabs).map(([k,v])=>`<button class="${t==k?"active":""}" onclick="window.procTab='${k}';procure()">${v}</button>`).join("")}</div></div>${body}</div>`}
    function procWork(){let q=[];state.storeReq.filter(x=>x.status=="待發料").forEach(x=>q.push(queueItem(x.status,`${x.id} · ${x.dept} 領料`,`${x.line.name} ${x.line.qty} ${x.line.uom}｜${x.purpose}`,`openStoreReq('${x.id}')`,"處理領料")));state.req.filter(x=>x.status=="待部門主管核准").forEach(x=>q.push(queueItem(x.status,`${x.id} · ${x.dept} 請購`,`${x.item.name} ${x.item.qty} ${x.item.uom}｜預算餘額 ${money(x.budgetAvailable)}`,`openPr('${x.id}')`,"簽核")));state.rfq.filter(x=>x.status=="待決選").forEach(x=>q.push(queueItem(x.status,`${x.id} · ${x.item}`,`${x.quotes.length} 家供應商待決選`, `openRfq('${x.id}')`,"開啟比價")));state.po.filter(x=>["待驗收","部分驗收"].includes(x.status)).forEach(x=>q.push(queueItem(x.status,`${x.id} · ${x.vendor}`,`${x.item} 已收 ${x.received}／${x.qty} ${x.uom}｜交貨 ${x.deliveryDate}`,`openPo('${x.id}')`,"辦理驗收")));state.supplierInv.filter(x=>["數量差異","金額差異","待三方比對"].includes(x.status)).forEach(x=>q.push(queueItem(x.status,`${x.id} · ${x.vendor}`,`${x.poId}｜差異 ${money(x.variance||0)}`,`openInvoice('${x.id}')`,"處理比對")));let normal=getPr("PR-260710-003"),exception=getSupplierInv("INV-QT-20260710");return`<div class="split"><div><div class="head"><div><h2>今日待辦與例外</h2><p>依角色顯示倉管、部門主管、採購與 AP 會計待辦。</p></div></div><div class="list">${q.join("")||queueItem("完成","今日工作已完成","目前沒有待辦單據","setPage('overview')","回總覽")}</div></div><div><div class="head"><div><h2>單據鏈樣本</h2><p>正常流程與異常流程都能追到來源。</p></div></div><div class="list"><div><strong style="font-size:13px">房務備品正常閉環</strong><div style="margin-top:8px">${relationChain(normal)}</div></div><div class="alert bad"><strong>${exception.id} 付款凍結</strong><br>PO 24kg、GRN 實收 22kg、供應商發票 24kg，差異 ${money(exception.variance)}。</div></div></div></div>`}
    function procStore(){return`${table(["領料單","部門／成本中心","品項","申請／實發／短少","倉庫","用途","狀態","操作"],state.storeReq.map(x=>[x.id,`${x.dept}<br><span class="muted">${x.costCenter}</span>`,x.line.name,`${x.line.qty}／${x.line.issued}／${x.line.shortage} ${x.line.uom}`,x.warehouse,x.purpose,st(x.status),`<button class="btn small" onclick="openStoreReq('${x.id}')">單據</button>${x.status=="待發料"?` <button class="btn small primary" onclick="issueStore('${x.id}')">發料</button>`:x.status=="庫存不足"&&x.linkedPr?` <button class="btn small" onclick="openPr('${x.linkedPr}')">查看 PR</button>`:""}`]))}<div class="note">飯店部門補貨先走 Store Requisition；中央倉不足、預測缺貨或沒有庫存品項時才轉外部採購 PR。</div>`}
    function procPr(){return`${table(["PR No.","來源／部門","用途","品項與數量","庫存／在途","預算餘額","狀態","操作"],state.req.map(r=>[r.id,`${r.source}<br><span class="muted">${r.dept} · ${r.costCenter}</span>`,r.purpose,`${r.item.name} ${r.item.qty} ${r.item.uom}<br><span class="muted">${r.item.spec}</span>`,stockRef(r),money(r.budgetAvailable),st(r.status),`<button class="btn small" onclick="openPr('${r.id}')">查看單據</button>`]))}<div class="note">PR 保存需求依據、預算、申請量、核准量、規格、附件與完整簽核紀錄，不會用單一「下一步」直接跳過責任人。</div>`}
    function procSource(){let rfqTable=table(["RFQ","來源 PR","品項","報價家數","最低報價","決選供應商","狀態","操作"],state.rfq.map(q=>{let low=Math.min(...q.quotes.map(x=>x.unitPrice)),sel=q.selected===null?"待決選":q.quotes[q.selected].vendor;return[q.id,q.prId,q.item,q.quotes.length,money(low),sel,st(q.status),`<button class="btn small" onclick="openRfq('${q.id}')">比價表</button>`]})),poTable=table(["PO","來源 PR","供應商","品項／數量","含稅總額","交貨日／倉庫","狀態","操作"],state.po.map(p=>[p.id,p.prId||"合約補貨",p.vendor,`${p.item} ${p.qty} ${p.uom}`,money(p.total),`${p.deliveryDate}<br><span class="muted">${p.warehouse}</span>`,st(p.status),`<button class="btn small" onclick="openPo('${p.id}')">採購單</button>`]));return`<div class="head"><div><h2>RFQ 供應商比價</h2><p>同時比較價格、交期、付款條件與供應商評分。</p></div></div>${rfqTable}<div class="head"><div><h2>Purchase Order 採購單</h2><p>決選後仍須採購經理核准，發出後才能驗收。</p></div></div>${poTable}`}
    function procReceive(){let openPoTable=table(["PO","供應商","品項","訂購／已收","預計交貨","狀態","操作"],state.po.map(p=>[p.id,p.vendor,p.item,`${p.qty}／${p.received} ${p.uom}`,p.deliveryDate,st(p.status),`<button class="btn small" onclick="openPo('${p.id}')">查看</button>`])),grnTable=table(["GRN","PO","倉庫／驗收人","實收／退貨","送貨單","金額","狀態","操作"],state.grn.map(g=>[g.id,g.poId,`${g.warehouse}<br><span class="muted">${g.receiver}</span>`,`${g.accepted}／${g.rejected} ${g.uom}`,g.deliveryNote,money(g.amount),st(g.status),`<button class="btn small" onclick="openGrn('${g.id}')">驗收單</button>`])),invTable=table(["Supplier Invoice","供應商發票","PO／GRN","發票數量","發票金額","三方比對","操作"],state.supplierInv.map(i=>[i.id,i.vendorInvoice,`${i.poId}<br><span class="muted">${i.grnIds.join("、")}</span>`,i.qty,money(i.amount),st(i.status),`<button class="btn small" onclick="openInvoice('${i.id}')">比對</button>`]));return`<div class="head"><div><h2>到貨與驗收</h2><p>支援分批到貨、短少、破損、退貨、倉別與驗收人。</p></div></div>${openPoTable}<div class="head"><div><h2>GRN 驗收單</h2><p>驗收過帳先形成存貨與已收貨未到發票，不直接產生正式 AP。</p></div></div>${grnTable}<div class="head"><div><h2>供應商發票與三方比對</h2><p>PO、GRN 與 Supplier Invoice 一致後才允許付款。</p></div></div>${invTable}`}

    function openStoreReq(id){let s=state.storeReq.find(x=>x.id==id),it=getInv(s.line.sku),remaining=s.line.qty-s.line.issued;$("modalTitle").textContent=id+" · Store Requisition 部門領料單";$("modalSub").textContent=s.property+"｜"+s.dept+"｜"+s.warehouse;$("modalBody").innerHTML=`<div class="doc-summary"><div><span>申請人</span><strong>${s.requester}</strong></div><div><span>成本中心</span><strong>${s.costCenter}</strong></div><div><span>申請日期</span><strong>${s.date}</strong></div><div><span>狀態</span><strong>${st(s.status)}</strong></div></div>${table(["SKU","品項","申請","已發","待發","目前庫存"],[[s.line.sku,s.line.name,s.line.qty+" "+s.line.uom,s.line.issued+" "+s.line.uom,remaining+" "+s.line.uom,(it?it[3]:0)+" "+s.line.uom]])}<div class="alert">${s.purpose}</div>${s.linkedPr?`<div><strong style="font-size:13px">關聯請購</strong><div style="margin-top:8px"><button class="doc-link" onclick="closeModal();openPr('${s.linkedPr}')">${s.linkedPr}</button></div></div>`:""}`;$("modalFoot").innerHTML=`<button class="btn" onclick="closeModal()">關閉</button>${s.status=="待發料"?`<button class="btn primary" onclick="closeModal();issueStore('${id}')">確認發料</button>`:s.status=="庫存不足"&&!s.linkedPr?`<button class="btn primary" onclick="closeModal();convertStoreToPr('${id}')">短缺轉 PR</button>`:""}`;$("modalBg").classList.add("open")}
    function issueStore(id,interactive=true){let s=state.storeReq.find(x=>x.id==id),it=getInv(s.line.sku),remaining=s.line.qty-s.line.issued;if(!s||!it)return;if(it[3]<remaining){s.line.shortage=remaining-it[3];s.status="庫存不足";save();render();if(interactive)toast(`${id} 可用庫存不足 ${s.line.shortage} ${s.line.uom}，請轉 PR`);return}it[3]-=remaining;s.line.issued=s.line.qty;s.line.shortage=0;s.status="已發料";let amount=remaining*it[6],debit=s.dept=="F&B"?"5201 餐飲原料耗用":s.dept=="Engineering"?"6104 工程維修耗材":"5101 客房備品耗用";addJournal(id,s.line.name+" 部門發料",debit,"1130 存貨",amount);let c=s.dept=="F&B"?state.cost[1]:s.dept=="Engineering"?state.cost[4]:state.cost[0];if(c)c[4]+=amount;save();render();if(interactive)toast(`${id} 已發料並過帳：借 ${debit}／貸存貨 ${money(amount)}`)}
    function convertStoreToPr(id){let s=state.storeReq.find(x=>x.id==id);if(!s)return;if(s.linkedPr){openPr(s.linkedPr);return}let it=getInv(s.line.sku),meta=deptMeta(it),r=createPr(it,Math.max(s.line.shortage,s.line.qty-s.line.issued),s.id,meta);s.linkedPr=r.id;save();render();toast(`${id} 的短缺量已轉為 ${r.id}`);openPr(r.id)}

    function openPr(id){let r=getPr(id);if(!r)return;let po=r.poId?getPo(r.poId):null;$("modalTitle").textContent=id+" · Purchase Requisition 請購單";$("modalSub").textContent=r.property+"｜"+r.dept+"｜"+r.costCenter;$("modalBody").innerHTML=`<div class="doc-summary"><div><span>申請人</span><strong>${r.requester}</strong></div><div><span>需求日期</span><strong>${r.needDate}</strong></div><div><span>預算科目</span><strong>${r.budget}</strong></div><div><span>目前狀態</span><strong>${st(r.status)}</strong></div></div><div class="alert">${r.purpose}<br>預算可用：${money(r.budgetAvailable)}｜優先級：${r.priority}</div>${table(["SKU","規格","現有／安全／在途","申請量","核准量","預估單價","預估金額"],[[r.item.sku,`${r.item.name}<br><span class="muted">${r.item.spec}</span>`,`${r.item.onHand}／${r.item.safety}／${r.item.onOrder} ${r.item.uom}`,r.item.qty+" "+r.item.uom,r.item.approvedQty+" "+r.item.uom,money(r.item.unitPrice),money(reqAmount(r))]])}<div><strong style="font-size:13px">簽核紀錄</strong>${approvalHtml(r)}</div><div><strong style="font-size:13px">關聯單據鏈</strong><div style="margin-top:8px">${relationChain(r)}</div></div>`;let action="";if(r.status=="待部門主管核准")action=`<button class="btn danger" onclick="closeModal();rejectPr('${id}')">退回補件</button><button class="btn primary" onclick="closeModal();approvePr('${id}')">核准並建立詢價</button>`;else if(r.status=="待比價")action=`<button class="btn primary" onclick="closeModal();openRfq('${r.rfqId}')">開啟比價表</button>`;else if(r.poId)action=`<button class="btn primary" onclick="closeModal();openPo('${r.poId}')">查看採購單</button>`;else if(r.invoiceId)action=`<button class="btn primary" onclick="closeModal();openInvoice('${r.invoiceId}')">查看發票比對</button>`;$("modalFoot").innerHTML=`<button class="btn" onclick="closeModal()">關閉</button>${action}`;$("modalBg").classList.add("open")}

    function supplierChoices(name,base){let primary=name.includes("床包")?"潔新布草":name.includes("可樂")?"豐泉飲品":"昇禾用品";return[{vendor:primary,unitPrice:base,lead:"3 日",terms:"月結 30 天",score:93},{vendor:"旅宿供應聯盟",unitPrice:+(base*.96).toFixed(2),lead:"7 日",terms:"月結 15 天",score:84},{vendor:"城北商行",unitPrice:+(base*1.04).toFixed(2),lead:"1 日",terms:"現金",score:86}]}

    function chooseQuote(id,index,interactive=true){let q=getRfq(id),r=getPr(q.prId);if(!q||q.status!="待決選")return;let quote=q.quotes[index];q.selected=index;q.status="已決選";let p={id:nextDocument("PO",state.po),prId:r.id,vendor:quote.vendor,buyer:"黃怡君",item:r.item.name,sku:r.item.sku,qty:r.item.approvedQty,received:0,uom:r.item.uom,unitPrice:quote.unitPrice,total:Math.round(quote.unitPrice*r.item.approvedQty),deliveryDate:"2026-07-15",warehouse:r.dept=="F&B"?"餐飲乾貨倉":r.dept=="Minibar"?"Minibar 倉":"中央倉",terms:quote.terms,tax:"含稅 5%",status:"待採購經理核准",grnIds:[],invoiceId:""};state.po.unshift(p);r.poId=p.id;r.status="待採購經理核准";r.approval.push(["2026-07-11 10:05","採購專員",`決選 ${quote.vendor}`]);save();render();if(interactive){toast(`${q.id} 已決選 ${quote.vendor}，建立 ${p.id}`);openPo(p.id)}}

    function openPrApproval(id){if(!isRole("manager"))return toast("請切換為部門主管");let r=getPr(id);if(!r||r.status!="待部門主管核准")return;showModal(`${id} · 部門主管簽核`,`${r.requester}｜${r.item.name} ${r.item.qty} ${r.item.uom}`,`<div class="doc-summary"><div><span>預估金額</span><strong>${money(reqAmount(r))}</strong></div><div><span>預算可用</span><strong>${money(r.budgetAvailable)}</strong></div><div><span>現有／安全</span><strong>${r.item.onHand}／${r.item.safety}</strong></div><div><span>需求日期</span><strong>${r.needDate}</strong></div></div><div class="alert">${h(r.purpose)}</div><div class="form-grid"><div class="field"><label for="approvedQty">核准數量</label><input id="approvedQty" type="number" min="1" max="${r.item.qty}" value="${r.item.qty}"></div><div class="field full"><label for="reviewNote">主管意見</label><textarea id="reviewNote" placeholder="核准理由或退回時需補充的資料"></textarea></div><label class="checkline full"><input id="budgetConfirm" type="checkbox"><span>我已確認需求依據、現有庫存、在途量及部門預算。</span></label></div>`,`<button class="btn" onclick="closeModal()">取消</button><button class="btn danger" onclick="commitPrReview('${id}','return')">退回補件</button><button class="btn primary" onclick="commitPrReview('${id}','approve')">核准請購</button>`)}
    function commitPrReview(id,decision){let r=getPr(id),note=fieldValue("reviewNote"),qty=Number(fieldValue("approvedQty"));if(decision=="approve"&&!$("budgetConfirm").checked)return toast("請先確認需求與部門預算");if(decision=="return"&&!note)return toast("退回時請填寫補件原因");if(decision=="approve"){if(!qty||qty<1||qty>r.item.qty)return toast("核准數量不正確");r.item.approvedQty=qty;r.status="已核准待採購";r.approval.push([nowStamp(),actorName("manager"),`核准 ${qty} ${r.item.uom}${note?"｜"+note:""}`])}else{r.status="退回補件";r.comments.push(note);r.approval.push([nowStamp(),actorName("manager"),`退回補件：${note}`])}save();closeModal();render();toast(`${id} 已${decision=="approve"?"核准，等待採購處理":"退回申請人補件"}`)}

    function openReceive(id){if(!isRole("warehouse"))return toast("請切換為倉管人員");let p=getPo(id),remaining=p.qty-p.received;if(!p||remaining<=0)return;showModal(`${id} · 建立驗收單 GRN`,`${p.vendor}｜${p.warehouse}｜驗收人 ${actorName("warehouse")}`,`<div class="doc-summary"><div><span>訂購量</span><strong>${p.qty} ${p.uom}</strong></div><div><span>累計已收</span><strong>${p.received} ${p.uom}</strong></div><div><span>未交數量</span><strong>${remaining} ${p.uom}</strong></div><div><span>品項</span><strong>${p.item}</strong></div></div><div class="form-grid"><div class="field"><label for="grnDeliveryNote">送貨單號</label><input id="grnDeliveryNote" value="DN-${h(p.vendor.slice(0,2))}-0711-${String(state.grn.length+1).padStart(2,"0")}"></div><div class="field"><label for="grnAccepted">本次實收</label><input id="grnAccepted" type="number" min="0" max="${remaining}" value="${remaining}"></div><div class="field"><label for="grnRejected">本次拒收</label><input id="grnRejected" type="number" min="0" max="${remaining}" value="0"></div><div class="field"><label for="grnBatch">批號</label><input id="grnBatch" placeholder="食品／備品適用"></div><div class="field"><label for="grnExpiry">效期</label><input id="grnExpiry" type="date"></div><div class="field"><label for="grnAttachment">送貨單／照片</label><input id="grnAttachment" type="file"></div><div class="field full"><label for="grnNote">驗收結果</label><textarea id="grnNote">數量、外觀與規格已點收。</textarea></div><label class="checkline full"><input id="grnConfirm" type="checkbox"><span>我已實際點收並確認實收、拒收、批號／效期及送貨單資料。</span></label></div>`,`<button class="btn" onclick="closeModal()">取消</button><button class="btn primary" onclick="commitReceipt('${id}')">確認驗收過帳</button>`)}
    function commitReceipt(id){let p=getPo(id),remaining=p.qty-p.received,accepted=Number(fieldValue("grnAccepted")),rejected=Number(fieldValue("grnRejected")),deliveryNote=fieldValue("grnDeliveryNote"),note=fieldValue("grnNote");if(!$("grnConfirm").checked)return toast("請先確認已實際點收");if(!deliveryNote||accepted<0||rejected<0||accepted+rejected<1||accepted+rejected>remaining)return toast("實收與拒收數量不正確");let g={id:nextDocument("GRN",state.grn),poId:p.id,date:"2026-07-11",warehouse:p.warehouse,receiver:actorName("warehouse"),deliveryNote,accepted,rejected,uom:p.uom,amount:Math.round(accepted*p.unitPrice),status:rejected?"有驗收差異":"已過帳",note,batch:fieldValue("grnBatch"),expiry:fieldValue("grnExpiry"),attachment:fileValue("grnAttachment")};state.grn.unshift(g);p.received+=accepted;p.grnIds.push(g.id);p.status=p.received>=p.qty?"已收貨":"部分驗收";let it=getInv(p.sku);if(it)it[3]+=accepted;let r=p.prId?getPr(p.prId):null;if(r)r.status=p.status=="已收貨"?"已收貨待發票":"部分到貨";if(accepted>0)addJournal(g.id,p.item+" 驗收入庫",p.sku.startsWith("FB")?"1132 餐飲原料存貨":"1131 營運用品存貨","2191 已收貨未到發票",g.amount);save();closeModal();render();toast(`${g.id} 已由 ${actorName("warehouse")} 確認過帳`);openGrn(g.id)}

    function openInvoiceEntry(poId){if(!isRole("finance"))return toast("請切換為財務人員");let p=getPo(poId);if(!p||p.received<=0)return;if(p.invoiceId)return openInvoice(p.invoiceId);showModal(`${poId} · 登錄供應商發票`,`${p.vendor}｜已收 ${p.received} ${p.uom}`,`<div class="doc-summary"><div><span>採購單金額</span><strong>${money(p.total)}</strong></div><div><span>驗收金額</span><strong>${money(p.received*p.unitPrice)}</strong></div><div><span>驗收單</span><strong>${p.grnIds.join("、")}</strong></div><div><span>付款條件</span><strong>${p.terms}</strong></div></div><div class="form-grid"><div class="field"><label for="invVendorNo">供應商發票號碼</label><input id="invVendorNo" placeholder="例如 AB12345678"></div><div class="field"><label for="invDate">發票日期</label><input id="invDate" type="date" value="2026-07-11"></div><div class="field"><label for="invQty">發票數量</label><input id="invQty" type="number" min="0" step="0.01" value="${p.received}"></div><div class="field"><label for="invAmount">含稅金額</label><input id="invAmount" type="number" min="0" value="${Math.round(p.received*p.unitPrice)}"></div><div class="field full"><label for="invAttachment">發票掃描檔</label><input id="invAttachment" type="file"></div><div class="field full"><label for="invNote">財務備註</label><textarea id="invNote">依供應商發票正本登錄，尚未執行三方比對。</textarea></div><label class="checkline full"><input id="invConfirm" type="checkbox"><span>我已核對供應商、發票號碼、日期、數量、金額及附件。</span></label></div>`,`<button class="btn" onclick="closeModal()">取消</button><button class="btn primary" onclick="commitInvoiceEntry('${poId}')">確認登錄發票</button>`)}
    function commitInvoiceEntry(poId){let p=getPo(poId),vendorInvoice=fieldValue("invVendorNo"),date=fieldValue("invDate"),qty=Number(fieldValue("invQty")),amount=Number(fieldValue("invAmount"));if(!$("invConfirm").checked)return toast("請先確認發票資料");if(!vendorInvoice||!date||qty<0||amount<=0)return toast("請完成發票號碼、日期、數量與金額");if(state.supplierInv.some(i=>i.vendorInvoice==vendorInvoice))return toast("供應商發票號碼已存在");let i={id:nextDocument("INV",state.supplierInv),vendorInvoice,poId:p.id,grnIds:[...p.grnIds],vendor:p.vendor,date,qty,amount,status:"待三方比對",variance:0,apId:"",note:fieldValue("invNote"),attachment:fileValue("invAttachment"),resolution:""};state.supplierInv.unshift(i);p.invoiceId=i.id;let r=p.prId?getPr(p.prId):null;if(r){r.invoiceId=i.id;r.status="已收貨待比對"}save();closeModal();render();toast(`${i.id} 已登錄，尚未形成應付帳款`);openInvoice(i.id)}

    function openMatchConfirmation(id){let i=getSupplierInv(id),p=getPo(i.poId),expected=invoiceExpected(i,p);showModal(`${id} · 確認三方比對`,`${p.id}｜${i.grnIds.join("、")}｜${i.vendorInvoice}`,`<div class="doc-summary"><div><span>採購單</span><strong>${money(p.total)}</strong></div><div><span>驗收金額</span><strong>${money(expected)}</strong></div><div><span>發票金額</span><strong>${money(i.amount)}</strong></div><div><span>發票數量</span><strong>${i.qty} ${p.uom}</strong></div></div><label class="checkline"><input id="matchConfirm" type="checkbox"><span>我已查看採購單、驗收單及供應商發票正本，確認執行系統比對。</span></label>`,`<button class="btn" onclick="closeModal()">取消</button><button class="btn primary" onclick="commitMatchInvoice('${id}')">確認執行比對</button>`)}

    function commitMatchInvoice(id){if(!$("matchConfirm").checked)return toast("請先確認三份來源單據");let i=getSupplierInv(id),p=getPo(i.poId),expected=invoiceExpected(i,p),exact=i.qty==p.received&&i.amount==expected,tol=!exact&&apWithinTol(i,p);if(exact||tol){i.status="比對通過";i.variance=i.amount-expected;i.resolution=exact?"財務確認三方比對通過":`容差內自動放行（差異 ${money(i.amount-expected)}，在容差 ±${money(state.apTolerance.amt)}／${state.apTolerance.pct}% 內）`;ensureAp(i,p,"待付款");let r=p.prId?getPr(p.prId):null;if(r)r.status="待付款";addJournal(i.id,p.item+(tol?" 發票過帳（容差內放行）":" 供應商發票過帳"),"2191 已收貨未到發票","2101 應付帳款",i.amount);if(tol)logAudit(`三方比對容差內自動放行 差異${money(i.amount-expected)}`,i.id)}else{i.status=i.qty!=p.received?"數量差異":"金額差異";i.variance=i.amount-expected;i.resolution="超出容差，付款凍結進待釋放佇列，待財務登錄處理方式";ensureAp(i,p,"付款凍結");let r=p.prId?getPr(p.prId):null;if(r)r.status="發票差異";logAudit(`三方比對超容差凍結付款 差異${money(i.variance)}`,i.id)}save();closeModal();render();toast(exact?`${id} 比對通過，已建立 ${i.apId}`:tol?`${id} 差異在容差內，自動放行並建立 ${i.apId}`:`${id} 超出容差，付款凍結`);openInvoice(id)}

    function openVarianceResolution(id){let i=getSupplierInv(id),p=getPo(i.poId);showModal(`${id} · 登錄差異處理`,`差異 ${money(i.variance||i.amount-invoiceExpected(i,p))}｜${i.vendor}`,`<div class="decision"><label><input type="radio" name="varianceAction" value="credit" checked><div><strong>要求折讓</strong><span>依實收數量調整發票，調整後重新三方比對。</span></div></label><label><input type="radio" name="varianceAction" value="replenish"><div><strong>要求供應商補貨</strong><span>保留原發票，付款持續凍結，等待補貨驗收。</span></div></label><label><input type="radio" name="varianceAction" value="accept"><div><strong>申請接受差異</strong><span>送財務主管覆核，核准後差異列採購差異費用。</span></div></label></div><div class="field"><label for="varianceNote">處理說明</label><textarea id="varianceNote" placeholder="請填寫聯絡供應商結果、折讓單或例外原因"></textarea></div>`,`<button class="btn" onclick="closeModal()">取消</button><button class="btn primary" onclick="commitVarianceResolution('${id}')">確認處理方式</button>`)}
    function commitVarianceResolution(id){let i=getSupplierInv(id),p=getPo(i.poId),action=document.querySelector('input[name="varianceAction"]:checked')?.value,note=fieldValue("varianceNote");if(!note)return toast("請填寫差異處理說明");if(action=="credit"){apIssueCreditMemo(i,p,note)}else if(action=="replenish"){i.status="待補貨";i.resolution=`供應商補貨：${note}`;ensureAp(i,p,"付款凍結")}else{i.status="待財務主管核准";i.resolution=`申請接受差異：${note}`;i.variance=i.amount-invoiceExpected(i,p);ensureAp(i,p,"付款凍結")}save();closeModal();render();toast(`${id} 已登錄處理方式`);openInvoice(id)}

    function reopenSoft(period){if(!isRole("executive"))return toast("僅財務主管可操作");let p=state.periods.find(x=>x.period==period);if(!p||p.stage!="soft")return;p.stage="open";p.status="開帳中";p.locked=false;logAudit("反軟結帳，期間 "+period+" 恢復開帳","PERIOD-"+period.replace("-",""));save();render();toast(`${period} 已反軟結帳，恢復開帳`)}
    function reverseClose(period){if(!isRole("executive"))return toast("僅財務主管可反結帳");let p=state.periods.find(x=>x.period==period);if(!p||p.stage!="hard")return;let later=state.periods.find(x=>x.period>period&&x.stage=="hard");if(later)return toast(`時序強制：須先反結帳 ${later.period} 才能反結帳 ${period}`);showModal(`反結帳／解帳 · ${period}`,"硬關帳期間解鎖，須留理由與稽核",`<div class="alert bad">反結帳將解除 ${period} 的過帳鎖定，允許重新過帳與更正。此為敏感操作，全程留稽核軌跡。</div><div class="field"><label for="rcNote">反結帳理由</label><textarea id="rcNote" placeholder="例：會計師調整分錄、期後事項更正"></textarea></div><label class="checkline"><input id="rcConfirm" type="checkbox"><span>我以財務主管權限核准反結帳並負相關內控責任。</span></label>`,`<button class="btn" onclick="closeModal()">取消</button><button class="btn danger" onclick="commitReverseClose('${period}')">確認反結帳</button>`)}

    function buildStockLedger(){
      let rows=[],summary=[];
      (state.stockCover||[]).forEach(sku=>{
        let o=state.stockOpen[sku];if(!o)return;
        let invRow=state.inv.find(r=>r[0]==sku),name=invRow?invRow[1]:sku,uom=invRow?invRow[5]:"";
        let txns=state.stockTxns.filter(t=>t.sku==sku).slice().sort((a,b)=>a.date<b.date?-1:a.date>b.date?1:0);
        let bal=o.qty,amt=o.qty*o.cost,avg=o.cost,inQ=0,inA=0,outQ=0,outA=0;
        rows.push({date:"2026-07-01",doc:"期初",type:"期初",name,wh:o.wh,inQ:0,outQ:0,unit:avg,bal,amt,uom,batch:"",expiry:"",note:"7 月期初結存"});
        txns.forEach(t=>{
          let ln={date:t.date,doc:t.doc,type:t.type,name,wh:t.wh,unit:0,uom,batch:t.batch||"",expiry:t.expiry||"",note:t.note||"",inQ:0,outQ:0};
          if(t.qty>0){let u=t.type=="調撥入"?avg:(t.unit||avg);bal+=t.qty;amt+=t.qty*u;avg=bal?amt/bal:u;ln.inQ=t.qty;ln.unit=u;if(t.type=="進貨"){inQ+=t.qty;inA+=t.qty*u}}
          else{let q=-t.qty;bal-=q;amt-=q*avg;ln.outQ=q;ln.unit=avg;if(t.type!="調撥出"){outQ+=q;outA+=q*avg}}
          ln.bal=bal;ln.amt=Math.round(amt);rows.push(ln);
        });
        let openAmt=o.qty*o.cost,endAmt=Math.round(amt),midInv=(openAmt+endAmt)/2,safety=invRow?invRow[4]:0,turnover=midInv>0?outA/midInv:0;
        summary.push({sku,name,cat:o.cat,wh:o.wh,uom,openQty:o.qty,openAmt,inQty:inQ,inAmt:Math.round(inA),outQty:outQ,outAmt:Math.round(outA),endQty:bal,endAmt,avg,turnover,slow:turnover<0.15&&bal>safety});
      });
      rows.sort((a,b)=>a.date<b.date?1:a.date>b.date?-1:0);
      return {rows,summary};
    }

    function commitIssue(){let sku=fieldValue("isSku"),qty=Number(fieldValue("isQty")),type=fieldValue("isType"),doc=fieldValue("isDoc")||("SO-"+nowStamp().slice(2,10).replace(/-/g,"")),note=fieldValue("isNote");
      if(!sku||qty<=0)return toast("請填寫品項與出庫數量");
      let o=state.stockOpen[sku],invRow=state.inv.find(x=>x[0]==sku);if(invRow&&invRow[3]<qty)return toast("庫存不足，無法出庫");
      let s=buildStockLedger().summary.find(x=>x.sku==sku),avg=s?Math.round(s.avg):(o?o.cost:0);
      state.stockTxns.push({date:nowStamp().slice(0,10),doc,type,sku,wh:o?o.wh:"",qty:-qty,note});
      if(invRow)invRow[3]=Math.max(0,invRow[3]-qty);

    function openTransfer(){if(!isRole("warehouse","executive"))return toast("僅倉管／主管可辦理調撥");

    function commitTransfer(){let sku=fieldValue("trSku"),qty=Number(fieldValue("trQty")),from=fieldValue("trFrom"),to=fieldValue("trTo");

function groupPage(){

      let ownerBar=`<div class="head"><div><h2>業主報表過濾</h2><p>依委託業主檢視其名下物業（owner reporting）。</p></div><div class="seg">${ownerBtns}</div></div>`;

      let body;

        rows.push([`<strong>合計</strong>`,`<strong>${all.length} 館</strong>`,`<strong>${sumRooms}</strong>`,`<strong>${(grpOcc*100).toFixed(1)}%</strong>`,"—","—",`<strong>${money(sumRev)}</strong>`,`<strong>${money(sumGop)}</strong>`,"","—"]);
        body=`<div class="card">${seg}<div class="alert">房產業績以 USALI（Uniform System of Accounts for the Lodging Industry）呈現：各館先算部門利潤（客房／餐飲／其他），扣除未分攤營運費用（Undistributed）後得營業毛利 GOP。ADR ＝ 客房收入 ÷ 住宿夜；RevPAR ＝ 客房收入 ÷ 可售房晚。</div>${table(["物業","館別 / 業主","客房數","住房率","ADR","RevPAR","營業收入","GOP","狀態","操作"],rows)}</div>`;

        ];
        let elimRev=state.groupElim.reduce((s,e)=>s+(e.type=="集中採購跨館調撥"?e.amount:0),0);
        let rows=lines.map(l=>{

          +`<div class="card"><div class="head"><div><h2>內部交易沖銷表 · Intercompany Elimination</h2><p>合併工作底稿：集團內部往來於合併時全數沖銷，僅保留對外部第三方之交易。</p></div><div class="action-stack">${isRole("finance","executive")?`<button class="btn primary" onclick="groupPostAllElim()">一鍵過帳全部沖銷</button>`:`<span class="role-only-note">限財務／主管過帳沖銷分錄</span>`}</div></div>${table(["沖銷單號","內部往來類型","沖銷金額","借方（沖銷）","貸方（沖銷）","狀態","操作"],state.groupElim.map(e=>[e.id,`<strong>${h(e.type)}</strong><br><span class="muted">${h(e.basis)}</span>`,money(e.amount),h(e.debit),h(e.credit),st(e.posted?"已過帳":"待沖銷"),`<button class="btn small" onclick="groupOpenElim('${e.id}')">${e.posted?"檢視":"沖銷"}</button>`]))}</div>`;

      let ownerCard=`<div class="card">${ownerBar}<div class="pad"><div class="doc-summary"><div><span>檢視範圍</span><strong>${h(groupOwnerLabel())}</strong></div><div><span>名下物業</span><strong>${all.length} 館 / ${sumRooms} 間</strong></div><div><span>營業收入</span><strong>${money(sumRev)}</strong></div><div><span>應付業主報表 GOP</span><strong>${money(sumGop)}</strong></div></div><div class="note">業主報表（owner reporting）僅顯示該業主名下物業之營運與分潤，作為委託管理每月對業主結算之依據；管理公司留存管理費，餘額分配予業主。</div></div></div>`;

function groupOwnerName(id){let o=(state.groupOwners||[]).find(x=>x[0]==id);return o?o[1]:id}
    function groupOwnerLabel(){let f=state.groupOwnerFilter||"ALL";return f=="ALL"?"全集團（3 家業主）":groupOwnerName(f)}
    function groupVisibleProps(){let f=state.groupOwnerFilter||"ALL";return state.groupProps.filter(p=>f=="ALL"||p.owner==f)}
    function groupRev(p){return p.roomRev+p.fbRev+p.otherRev}
    function groupDeptProfit(p){return p.roomsProfit+p.fbProfit+p.otherProfit}
    function groupGop(p){return groupDeptProfit(p)-p.undist}
    function groupOcc(p){let avail=p.rooms*31;return avail?p.soldRoomNights/avail:0}

    function groupRevpar(p){let avail=p.rooms*31;return avail?p.roomRev/avail:0}
    function groupBaseFee(p){return Math.round(groupRev(p)*p.baseRate)}

function flowFind(id){return (state.flowInbox||[]).find(x=>x.id==id)}
function flowStepName(x){let d=(state.flowDefs||[]).find(w=>w.id==x.wf);if(!d)return x.approver;let n=d.chain.find(c=>c.no==x.stepNo);return n?n.role+"（"+n.person+"）":x.approver}
function flowCondMet(cond,amt){if(!cond||cond=="全部")return true;let m=String(cond).replace(/[^0-9]/g,"");let n=Number(m||0);return cond.includes(">")?amt>n:cond.includes("≤")?amt<=n:true}
function flowChainHtml(x){let d=(state.flowDefs||[]).find(w=>w.id==x.wf);if(!d)return"";
  return `<div class="flow">${d.chain.map(n=>{let done=n.no<x.stepNo,cur=n.no==x.stepNo;let cls=done?"done":cur?"active":"";let pill=done?st("完成"):cur?st("待簽核"):`<span class="status"><span class="dot"></span>未到關</span>`;

function flowMoveToHistory(id,act,result,memo){let x=flowFind(id);if(!x)return;
  state.flowHistory.unshift({id:x.id,doc:x.doc,title:x.title,amount:x.amount,ts:nowStamp(),actor:role().name+" "+role().title,act,memo,result});
  state.flowInbox=state.flowInbox.filter(v=>v.id!=id);
}
function flowApprove(id){let x=flowFind(id);if(!x)return;
  let d=(state.flowDefs||[]).find(w=>w.id==x.wf);
  let next=d?d.chain.find(c=>c.no>x.stepNo&&flowCondMet(c.cond,x.amount)):null;
  let memo=fieldValue("flMemo")||"同意";
  if(next){x.stepNo=next.no;x.approver=next.person;x.elapsed=0;
    state.flowHistory.unshift({id:x.id,doc:x.doc,title:x.title,amount:x.amount,ts:nowStamp(),actor:role().name+" "+role().title,act:"核准",memo,result:"轉下一關"});
    logAudit("簽核核准並流轉至第 "+next.no+" 關 "+money(x.amount),id);save();closeModal();render();toast(`${id} 已核准，流轉至「${next.role}」`);return;
  }
  flowMoveToHistory(id,"核准","已核准",memo);
  logAudit("完成末關簽核核准 "+money(x.amount),id);save();closeModal();render();toast(`${id} 已完成全部簽核並核准`);
}

function hcmCalc(e){

      let laborSelf=Math.round(e.laborGrade*er.laborRate*0.2);
      let laborEmployer=Math.round(e.laborGrade*er.laborRate*er.laborEmployerShare);
      let healthSelf=Math.round(e.healthGrade*er.healthRate*0.3);
      let healthEmployer=Math.round(e.healthGrade*er.healthRate*er.healthEmployerShare*er.healthDeps);
      let pension=Math.round(e.laborGrade*er.pensionRate);
      let supp=gross>er.suppThreshold&&ot>0?Math.round(ot*er.suppRate):0;
      let tax=Math.round(gross*e.taxRate);
      let net=gross-laborSelf-healthSelf-supp-tax;
      let employerCost=gross+laborEmployer+healthEmployer+pension;

function taxCalc401(){
  var live=state.taxInv.filter(function(i){return i.status!="已作廢"});
  var outputSales=live.reduce(function(a,i){return a+i.sales},0);
  var outputTax=live.reduce(function(a,i){return a+i.tax},0);
  var allowTax=state.taxVoid.filter(function(v){return v.status=="已折讓"}).reduce(function(a,v){return a+(v.net||0)},0);
  outputTax=outputTax-allowTax; outputSales=outputSales-(allowTax*20);
  var ded=state.taxPurchase.filter(function(p){return p.deduct});
  var inputNet=ded.reduce(function(a,p){return a+p.net},0);
  var inputTax=ded.reduce(function(a,p){return a+p.tax},0);
  var priorCredit=8400;
  var payable=outputTax-inputTax-priorCredit;
  return {outputSales:outputSales,outputTax:outputTax,inputNet:inputNet,inputTax:inputTax,priorCredit:priorCredit,payable:payable};
}
function taxNextNo(prefix){
  var t=state.taxTrack.find(function(x){return x.prefix==prefix});
  if(!t) return prefix+"-10000000";
  var base=Number(t.range.split(" ~ ")[0].split("-")[1]);
  return prefix+"-"+String(base+t.used+t.voided).padStart(8,"0");
}

  else { addJournal("VAT-401-2607","營業稅 401 留抵轉次期（07-08 月）","1140 進項留抵稅額","2261 銷項稅額",Math.abs(payable)); }
  logAudit("完成營業稅 401 申報 "+(payable>=0?"應納 ":"留抵 ")+money(Math.abs(payable)),"VAT-401-2607");
  save();closeModal();render();toast("401 已申報，"+(payable>=0?"應納 "+money(payable):"留抵 "+money(Math.abs(payable)))+" 分錄已產生");
}
function taxOpenWht(id){
  var w=state.taxWht.find(function(x){return x.id==id}); if(!w) return;
  showModal(id+" · 各類所得扣繳憑單",h(w.code)+"｜"+h(w.payee),
    '<div class="doc-summary"><div><span>給付總額</span><strong>'+money(w.amount)+'</strong></div><div><span>扣繳率</span><strong>'+h(w.rate)+'</strong></div><div><span>扣繳稅額</span><strong>'+money(w.tax)+'</strong></div><div><span>實付淨額</span><strong>'+money(w.net)+'</strong></div></div>'
    +'<dl class="kv"><dt>所得格式代號</dt><dd>'+h(w.code)+'</dd><dt>所得人</dt><dd>'+h(w.payee)+'</dd><dt>說明</dt><dd>'+h(w.note)+'</dd></dl>'
    +'<div class="alert">扣繳義務人於給付時扣取稅款，次年 1 月底前向國稅局申報並填發扣繳憑單。分錄（給付時）：借 費用 '+money(w.amount)+'，貸 銀行存款 '+money(w.net)+'，貸 2262 代扣繳稅款 '+money(w.tax)+'。</div>',
    '<button class="btn" onclick="closeModal()">關閉</button>'+(w.tax>0&&isRole("finance","executive")?'<button class="btn primary" onclick="taxRemitWht(\''+id+'\')">繳納扣繳稅款</button>':''));
}
function taxRemitWht(id){
  if(!isRole("finance","executive")) return toast("僅會計／財務可繳納扣繳稅款");
  var w=state.taxWht.find(function(x){return x.id==id}); if(!w||w.tax<=0) return;
  addJournal("WHT-PAY-"+id,"繳納扣繳稅款 "+w.code,"2262 代扣繳稅款","1102 銀行存款",w.tax);
  logAudit("繳納扣繳稅款 "+money(w.tax)+"（"+w.code+"）",id);
  save();closeModal();render();toast(id+" 扣繳稅款 "+money(w.tax)+" 已繳納並過帳");
}
    // ── 電子發票上傳存證期限 + 401 媒體檔 ──
    function taxCertDays(dl){return Math.round((new Date(dl)-new Date("2026-07-11"))/86400000)}
    function taxxExtra(){
      var rows=state.taxCertQueue.map(function(r){var d=taxCertDays(r.deadline);var stt=r.uploaded?st("已存證"):d<0?st("逾期未存證"):d<=1?st("即將逾期"):st("待存證");var when=r.uploaded?'<span class="muted">已上傳</span>':d<0?('<span class="bad">逾期 '+(-d)+' 天</span>'):('剩 '+d+' 天');var act=r.uploaded?'':(isRole("finance","executive")?'<button class="btn small primary" onclick="taxCertUpload(\''+r.doc+'\')">上傳存證</button>':'');return [r.doc,h(r.kind),h(r.party),h(r.base),r.issueDate,r.deadline+'<br><span class="muted">'+(r.party=="營業人"?"翌日起 7 日":"翌日起 2 日")+'</span>',when,stt,act]});
      var overdue=state.taxCertQueue.filter(function(r){return !r.uploaded&&taxCertDays(r.deadline)<0}).length;
      var s=taxCalc401();var pay=(s.payable!=null?s.payable:s.outputTax-s.inputTax);
      return '<div class="card"><div class="head"><div><h2>折讓／作廢上傳存證期限 · 翌日 2／7 日</h2><p>電子發票折讓、作廢須自開立日「翌日起算」上傳整合服務平台存證：營業人 7 日內、非營業人 2 日內，逾期受罰。</p></div>'+(overdue?'<span class="status st-bad"><span class="dot"></span>'+overdue+' 筆逾期</span>':'')+'</div>'+table(["單號","類型","身分","來源／原因","開立日","存證期限","剩餘","狀態","操作"],rows)+'</div>'
        +'<div class="card"><div class="head"><div><h2>營業稅 401 申報與媒體檔</h2><p>彙總本期銷項／進項憑證，試算應納稅額並產生可上傳的 401 媒體檔（CSV）。</p></div>'+(isRole("finance","executive")?'<button class="btn primary" onclick="taxExport401()">產生 401 媒體檔（CSV）</button>':'')+'</div><div class="pad"><dl class="kv"><dt>銷項稅額</dt><dd>'+money(s.outputTax)+'</dd><dt>進項稅額</dt><dd>'+money(s.inputTax)+'</dd><dt>本期應納（留抵）稅額</dt><dd>'+money(pay)+'</dd><dt>格式代號</dt><dd>三聯式 31／二聯式 32／收銀機 35（彙總示意）</dd></dl></div></div>';
    }
    function taxCertUpload(doc){var r=state.taxCertQueue.find(function(x){return x.doc==doc});if(!r)return;var late=taxCertDays(r.deadline)<0;r.uploaded=true;logAudit((late?"逾期":"")+"上傳折讓／作廢存證至財政部平台 "+doc,doc);save();render();toast(doc+(late?" 已逾期上傳存證（已記稽核）":" 已上傳整合服務平台存證"))}
    function taxExport401(){if(!isRole("finance","executive"))return toast("僅財務可產生媒體檔");var s=taxCalc401();var pay=(s.payable!=null?s.payable:s.outputTax-s.inputTax);var rows=[["類別","格式","單號/來源","銷售額/金額","稅額"]];(state.taxInv||[]).forEach(function(i){if(i.status!="已作廢")rows.push(["銷項",i.type||"三聯式",i.no,i.sales,i.tax])});(state.taxPurchase||[]).forEach(function(p){if(p.deduct)rows.push(["進項",p.type||"三聯式",p.no||p.vendor||p.src||"進項憑證",-(p.net||0),-(p.tax||0)])});rows.push(["合計","","銷項稅額",s.outputTax,""]);rows.push(["合計","","進項稅額",s.inputTax,""]);rows.push(["合計","","應納(留抵)稅額",pay,""]);var csv="﻿"+rows.map(function(r){return r.join(",")}).join("\n");var blob=new Blob([csv],{type:"text/csv;charset=utf-8"});var url=URL.createObjectURL(blob);var a=document.createElement("a");a.href=url;a.download="401_media_2026-07.csv";document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);logAudit("產生營業稅 401 媒體檔 CSV","TAX-401");toast("401 媒體檔已產生並下載（CSV）")}

    // ── AP 折讓/紅字沖銷、Hold/Release、容差 ──
    function apIssueCreditMemo(i,p,note){let expected=invoiceExpected(i,p),diff=i.amount-expected;let cm={id:nextDocument("CN",state.creditMemos),invId:i.id,vendor:i.vendor,poId:p.id,date:nowStamp().slice(0,10),qtyAdj:i.qty-p.received,amount:diff,reason:note,status:"已沖銷"};state.creditMemos.unshift(cm);i.status="比對通過";i.variance=0;i.resolution=`已開立折讓單 ${cm.id} 沖回 ${money(diff)}（原發票 ${i.id} 保留不修改）：${note}`;ensureAp(i,p,"待付款");let ap=i.apId?state.ap.find(a=>a[0]==i.apId):null;if(ap){ap[3]=expected;ap[5]="待付款"}let r=p.prId?getPr(p.prId):null;if(r)r.status="待付款";addJournal(i.id,p.item+" 供應商發票過帳","2191 已收貨未到發票","2101 應付帳款",i.amount);addJournal(cm.id,p.item+" 供應商折讓 紅字沖回溢開金額","2101 應付帳款","2191 已收貨未到發票",diff);logAudit(`開立折讓單 ${cm.id} 沖回 ${money(diff)}，原發票 ${i.id} 保留`,cm.id);}
    function apReleaseInvoice(id){if(!isRole("executive"))return toast("僅財務主管可釋放凍結發票");let i=getSupplierInv(id),p=getPo(i.poId);if(!i||!p)return;showModal(`${id} · 釋放凍結發票 Release`,`${i.vendor}｜差異 ${money(i.variance||i.amount-invoiceExpected(i,p))}`,`<div class="alert bad">${h(i.resolution||"超出容差凍結")}</div><div class="field"><label for="relNote">釋放理由（將寫入稽核軌跡）</label><textarea id="relNote" placeholder="例：一次性採購、金額微小、已與供應商確認"></textarea></div><label class="checkline"><input id="relConfirm" type="checkbox"><span>我以財務主管權限核准釋放此發票，差異列採購差異費用。</span></label>`,`<button class="btn" onclick="closeModal()">取消</button><button class="btn primary" onclick="apCommitRelease('${id}')">核准釋放</button>`);}
    function apCommitRelease(id){let i=getSupplierInv(id),p=getPo(i.poId),note=fieldValue("relNote");if(!$("relConfirm").checked||!note)return toast("請填寫釋放理由並確認");let expected=invoiceExpected(i,p),diff=i.amount-expected;i.status="比對通過";i.resolution=(i.resolution||"")+`｜財務主管釋放：${note}`;ensureAp(i,p,"待付款");let ap=i.apId?state.ap.find(a=>a[0]==i.apId):null;if(ap){ap[3]=i.amount;ap[5]="待付款"}let r=p.prId?getPr(p.prId):null;if(r)r.status="待付款";addJournal(i.id,p.item+" 發票釋放過帳","2191 已收貨未到發票","2101 應付帳款",expected);if(diff)addJournal(i.id,"採購差異（釋放）","6299 採購差異","2101 應付帳款",diff);state.apReleaseLog.unshift([nowStamp(),role().name,id,money(diff),note]);logAudit(`釋放凍結發票 ${id}，差異 ${money(diff)} 列採購差異`,id);save();closeModal();render();toast(`${id} 已釋放，可付款`);}
    function apEditTolerance(){if(!isRole("finance","executive"))return toast("僅財務可調整容差");let t=state.apTolerance;showModal("調整三方比對容差 · Tolerance","容差內自動放行門檻",`<div class="form-grid"><div class="field"><label for="tolAmt">金額容差 NT$</label><input id="tolAmt" type="number" value="${t.amt}"></div><div class="field"><label for="tolPct">金額容差 %</label><input id="tolPct" type="number" value="${t.pct}"></div><div class="field"><label for="tolQty">數量容差 %</label><input id="tolQty" type="number" value="${t.qtyPct}"></div></div><div class="alert">調高容差＝更多發票自動放行、人工介入變少，但需與內控風險權衡；此設定即時套用於後續比對。</div>`,`<button class="btn" onclick="closeModal()">取消</button><button class="btn primary" onclick="apCommitTolerance()">儲存容差</button>`);}
    function apCommitTolerance(){let t=state.apTolerance;t.amt=Math.max(0,Number(fieldValue("tolAmt"))||0);t.pct=Math.max(0,Number(fieldValue("tolPct"))||0);t.qtyPct=Math.max(0,Number(fieldValue("tolQty"))||0);logAudit(`調整三方比對容差為 ±${money(t.amt)}／${t.pct}%／數量${t.qtyPct}%`,"AP-TOLERANCE");save();closeModal();render();toast("容差已更新，後續比對即時套用");}

    $("resetBtn").onclick=()=>{localStorage.removeItem(KEY);state=structuredClone(seed);hydrateDemo(state);window.procTab="work";window.reportTab="pl";save();render();toast("Demo 資料已重設")};
    $("closeModal").onclick=closeModal;
    $("modalBg").onclick=e=>{if(e.target==e.currentTarget)closeModal()};
    document.addEventListener("keydown",e=>{if(e.key=="Escape")closeModal()});
    render();
