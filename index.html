    function load(){try{return JSON.parse(localStorage.getItem(KEY))||structuredClone(seed)}catch{return structuredClone(seed)}}function save(){localStorage.setItem(KEY,JSON.stringify(state))}function $(id){return document.getElementById(id)}function money(n){return"NT$"+Math.round(n).toLocaleString("zh-TW")}function rev(){return state.cost.reduce((s,x)=>s+x[1],0)}function ota(){return state.cost.reduce((s,x)=>s+x[2],0)}function opCost(){return state.cost.reduce((s,x)=>s+x[3]+x[4]+x[5],0)}function gp(){return rev()-ota()-opCost()}function salary(e){return e[4]=="月薪"?Math.round(e[5]+e[5]/176*1.34*e[7]):Math.round(e[5]*e[6]+e[5]*1.34*e[7])}function payroll(){return state.emp.reduce((s,e)=>s+salary(e),0)}function invVal(){return state.inv.reduce((s,x)=>s+x[3]*x[6],0)}function openAr(){return state.ar.filter(x=>x[7]!="已收款").length}function openAp(){return state.ap.filter(x=>x[5]!="已付款").length}function arAmt(){return state.ar.filter(x=>x[7]!="已收款").reduce((s,x)=>s+x[3],0)}function apAmt(){return state.ap.filter(x=>x[5]!="已付款").reduce((s,x)=>s+x[3],0)}function cash(){return 860000+state.ar.filter(x=>x[7]=="已收款").reduce((s,x)=>s+x[3],0)-state.ap.filter(x=>x[5]=="已付款").reduce((s,x)=>s+x[3],0)-payroll()}function low(){return state.inv.filter(x=>x[3]<x[4])}

iv></div></div>`}

    function plan(){ $("plan").innerHTML=`<div class="grid cols3">${small("第一階段","VenueOS 同步、應收帳款、庫存安全量、飯店 ERP 總覽、三大報表雛形")}${small("第二階段","採購流程、應付帳款、驗收入庫、成本中心、傳票匯出")}${small("第三階段","人事薪資、多館權限、預算控管、正式會計系統串接")}</div><div class="split"><div class="card"><div class="head"><div><h2>客戶需提供資料</h2><p>Demo 後可直接用這份清單跟客戶確認第一期範圍。</p></div></div><div class="list">${state.tasks.map((t,i)=>`<label class="task"><input type="checkbox" ${t[2]?"checked":""} onchange="state.tasks[${i}][2]=!state.tasks[${i}][2];save();render()"><div><strong>${t[0]}</strong><span>${t[1]}</span></div>${t[2]?st("完成"):st("待確認")}</label>`).join("")}</div></div><div class="card pad"><h2 style="font-size:15px;margin:0 0 10px">Demo 話術</h2><p style="margin:0;line-height:1.75">VenueOS 管前台交易、會員與核銷；ERP 管後台閉環。資料進來後會變成應收、發票、收款、庫存扣料、請購、採購、驗收、應付、成本，最後產出損益表、資產負債表與現金流量表。</p></div></div>`}

    function runNext(){let i=state.loopStep;if(i==0)simulateSync(false);if(i==1&&!state.ar.some(x=>x[0]=="AR-260799"))state.ar.unshift(["AR-260799","VenueOS 今日企業月結","企業住宿月結",76200,"2026-07-25",0,"待開立","待開票"]);if(i==2){let x=state.ar.find(x=>x[7]!="已收款");if(x){x[7]="已收款";if(x[6]=="待開立")x[6]="AB12990001"}}if(i==3)consume(false);if(i==4){let x=low()[0]||state.inv[0];reqFrom(x[0],false)}if(i==5){let r=state.req.find(x=>x[5]=="待核准");if(r)advanceReq(r[0]);let p=state.po.find(x=>x[5]!="已驗收");if(p)receivePO(p[0],false)}if(i==6)state.cost[0][4]+=4200;state.loopStep=Math.min(i+1,steps.length);save();render();toast(i>=steps.length?"閉環流程已完成，可查看三大會計報表":steps[i][0]+" 已完成")}

    function approvalHtml(r){return`<div class="audit">${r.approval.map(x=>`<div class="audit-row"><span>${x[0]}</span><strong>${x[1]} · ${x[2]}</strong>${st(x[2].includes("核准")||x[2].includes("送出")?"完成":x[2])}</div>`).join("")}</div>`}
    function queueItem(status,title,sub,action,label){return`<div class="task"><span>${st(status)}</span><div><strong>${title}</strong><span>${sub}</span></div><button class="btn small" onclick="${action}">${label}</button></div>`}

    function procure(){let t=window.procTab||"work",tabs={work:"工作台",store:"部門領料",pr:"PR 請購",source:"比價／PO",receive:"驗收／發票"},pendingStore=state.storeReq.filter(x=>x.status=="待發料").length,pendingPr=state.req.filter(x=>x.status=="待部門主管核准").length,pendingRfq=state.rfq.filter(x=>x.status=="待決選").length,exceptions=state.supplierInv.filter(x=>["數量差異","金額差異"].includes(x.status)).length;let body=t=="store"?procStore():t=="pr"?procPr():t=="source"?procSource():t=="receive"?procReceive():procWork();$("procure").innerHTML=`<div class="grid cols4">${metric("待發料 SR",pendingStore+" 張","中央倉／餐飲倉／工程倉","warn")}${metric("待核准 PR",pendingPr+" 張","預算與部門主管簽核","warn")}${metric("待決選 RFQ",pendingRfq+" 張","三家報價、交期與付款條件","warn")}${metric("比對異常",exceptions+" 張","差異未解前凍結付款","bad","ap")}</div><div class="card pad"><div class="process"><span>部門領料 SR</span><b>→</b><span>庫存不足轉 PR</span><b>→</b><span>簽核與預算</span><b>→</b><span>RFQ 比價</span><b>→</b><span>PO</span><b>→</b><span>GRN 驗收</span><b>→</b><span>Supplier Invoice</span><b>→</b><span>三方比對</span><b>→</b><span>AP／付款</span></div></div><div class="card"><div class="head"><div><h2>飯店採購工作台</h2><p>所有狀態由實際單據動作推進，並保留關聯單號與簽核軌跡。</p></div><div class="seg">${Object.entries(tabs).map(([k,v])=>`<button class="${t==k?"active":""}" onclick="window.procTab='${k}';procure()">${v}</button>`).join("")}</div></div>${body}</div>`}
    function procWork(){let q=[];state.storeReq.filter(x=>x.status=="待發料").forEach(x=>q.push(queueItem(x.status,`${x.id} · ${x.dept} 領料`,`${x.line.name} ${x.line.qty} ${x.line.uom}｜${x.purpose}`,`openStoreReq('${x.id}')`,"處理領料")));state.req.filter(x=>x.status=="待部門主管核准").forEach(x=>q.push(queueItem(x.status,`${x.id} · ${x.dept} 請購`,`${x.item.name} ${x.item.qty} ${x.item.uom}｜預算餘額 ${money(x.budgetAvailable)}`,`openPr('${x.id}')`,"簽核")));state.rfq.filter(x=>x.status=="待決選").forEach(x=>q.push(queueItem(x.status,`${x.id} · ${x.item}`,`${x.quotes.length} 家供應商待決選`, `openRfq('${x.id}')`,"開啟比價")));state.po.filter(x=>["待驗收","部分驗收"].includes(x.status)).forEach(x=>q.push(queueItem(x.status,`${x.id} · ${x.vendor}`,`${x.item} 已收 ${x.received}／${x.qty} ${x.uom}｜交貨 ${x.deliveryDate}`,`openPo('${x.id}')`,"辦理驗收")));state.supplierInv.filter(x=>["數量差異","金額差異","待三方比對"].includes(x.status)).forEach(x=>q.push(queueItem(x.status,`${x.id} · ${x.vendor}`,`${x.poId}｜差異 ${money(x.variance||0)}`,`openInvoice('${x.id}')`,"處理比對")));let normal=getPr("PR-260710-003"),exception=getSupplierInv("INV-QT-20260710");return`<div class="split"><div><div class="head"><div><h2>今日待辦與例外</h2><p>依角色顯示倉管、部門主管、採購與 AP 會計待辦。</p></div></div><div class="list">${q.join("")||queueItem("完成","今日工作已完成","目前沒有待辦單據","setPage('overview')","回總覽")}</div></div><div><div class="head"><div><h2>單據鏈樣本</h2><p>正常流程與異常流程都能追到來源。</p></div></div><div class="list"><div><strong style="font-size:13px">房務備品正常閉環</strong><div style="margin-top:8px">${relationChain(normal)}</div></div><div class="alert bad"><strong>${exception.id} 付款凍結</strong><br>PO 24kg、GRN 實收 22kg、供應商發票 24kg，差異 ${money(exception.variance)}。</div></div></div></div>`}
    function procStore(){return`${table(["領料單","部門／成本中心","品項","申請／實發／短少","倉庫","用途","狀態","操作"],state.storeReq.map(x=>[x.id,`${x.dept}<br><span class="muted">${x.costCenter}</span>`,x.line.name,`${x.line.qty}／${x.line.issued}／${x.line.shortage} ${x.line.uom}`,x.warehouse,x.purpose,st(x.status),`<button class="btn small" onclick="openStoreReq('${x.id}')">單據</button>${x.status=="待發料"?` <button class="btn small primary" onclick="issueStore('${x.id}')">發料</button>`:x.status=="庫存不足"&&x.linkedPr?` <button class="btn small" onclick="openPr('${x.linkedPr}')">查看 PR</button>`:""}`]))}<div class="note">飯店部門補貨先走 Store Requisition；中央倉不足、預測缺貨或沒有庫存品項時才轉外部採購 PR。</div>`}
    function procPr(){return`${table(["PR No.","來源／部門","用途","品項與數量","庫存／在途","預算餘額","狀態","操作"],state.req.map(r=>[r.id,`${r.source}<br><span class="muted">${r.dept} · ${r.costCenter}</span>`,r.purpose,`${r.item.name} ${r.item.qty} ${r.item.uom}<br><span class="muted">${r.item.spec}</span>`,stockRef(r),money(r.budgetAvailable),st(r.status),`<button class="btn small" onclick="openPr('${r.id}')">查看單據</button>`]))}<div class="note">PR 保存需求依據、預算、申請量、核准量、規格、附件與完整簽核紀錄，不會用單一「下一步」直接跳過責任人。</div>`}
    function procSource(){let rfqTable=table(["RFQ","來源 PR","品項","報價家數","最低報價","決選供應商","狀態","操作"],state.rfq.map(q=>{let low=Math.min(...q.quotes.map(x=>x.unitPrice)),sel=q.selected===null?"待決選":q.quotes[q.selected].vendor;return[q.id,q.prId,q.item,q.quotes.length,money(low),sel,st(q.status),`<button class="btn small" onclick="openRfq('${q.id}')">比價表</button>`]})),poTable=table(["PO","來源 PR","供應商","品項／數量","含稅總額","交貨日／倉庫","狀態","操作"],state.po.map(p=>[p.id,p.prId||"合約補貨",p.vendor,`${p.item} ${p.qty} ${p.uom}`,money(p.total),`${p.deliveryDate}<br><span class="muted">${p.warehouse}</span>`,st(p.status),`<button class="btn small" onclick="openPo('${p.id}')">採購單</button>`]));return`<div class="head"><div><h2>RFQ 供應商比價</h2><p>同時比較價格、交期、付款條件與供應商評分。</p></div></div>${rfqTable}<div class="head"><div><h2>Purchase Order 採購單</h2><p>決選後仍須採購經理核准，發出後才能驗收。</p></div></div>${poTable}`}
    function procReceive(){let openPoTable=table(["PO","供應商","品項","訂購／已收","預計交貨","狀態","操作"],state.po.map(p=>[p.id,p.vendor,p.item,`${p.qty}／${p.received} ${p.uom}`,p.deliveryDate,st(p.status),`<button class="btn small" onclick="openPo('${p.id}')">查看</button>`])),grnTable=table(["GRN","PO","倉庫／驗收人","實收／退貨","送貨單","金額","狀態","操作"],state.grn.map(g=>[g.id,g.poId,`${g.warehouse}<br><span class="muted">${g.receiver}</span>`,`${g.accepted}／${g.rejected} ${g.uom}`,g.deliveryNote,money(g.amount),st(g.status),`<button class="btn small" onclick="openGrn('${g.id}')">驗收單</button>`])),invTable=table(["Supplier Invoice","供應商發票","PO／GRN","發票數量","發票金額","三方比對","操作"],state.supplierInv.map(i=>[i.id,i.vendorInvoice,`${i.poId}<br><span class="muted">${i.grnIds.join("、")}</span>`,i.qty,money(i.amount),st(i.status),`<button class="btn small" onclick="openInvoice('${i.id}')">比對</button>`]));return`<div class="head"><div><h2>到貨與驗收</h2><p>支援分批到貨、短少、破損、退貨、倉別與驗收人。</p></div></div>${openPoTable}<div class="head"><div><h2>GRN 驗收單</h2><p>驗收過帳先形成存貨與已收貨未到發票，不直接產生正式 AP。</p></div></div>${grnTable}<div class="head"><div><h2>供應商發票與三方比對</h2><p>PO、GRN 與 Supplier Invoice 一致後才允許付款。</p></div></div>${invTable}`}

    function openStoreReq(id){let s=state.storeReq.find(x=>x.id==id),it=getInv(s.line.sku),remaining=s.line.qty-s.line.issued;$("modalTitle").textContent=id+" · Store Requisition 部門領料單";$("modalSub").textContent=s.property+"｜"+s.dept+"｜"+s.warehouse;$("modalBody").innerHTML=`<div class="doc-summary"><div><span>申請人</span><strong>${s.requester}</strong></div><div><span>成本中心</span><strong>${s.costCenter}</strong></div><div><span>申請日期</span><strong>${s.date}</strong></div><div><span>狀態</span><strong>${st(s.status)}</strong></div></div>${table(["SKU","品項","申請","已發","待發","目前庫存"],[[s.line.sku,s.line.name,s.line.qty+" "+s.line.uom,s.line.issued+" "+s.line.uom,remaining+" "+s.line.uom,(it?it[3]:0)+" "+s.line.uom]])}<div class="alert">${s.purpose}</div>${s.linkedPr?`<div><strong style="font-size:13px">關聯請購</strong><div style="margin-top:8px"><button class="doc-link" onclick="closeModal();openPr('${s.linkedPr}')">${s.linkedPr}</button></div></div>`:""}`;$("modalFoot").innerHTML=`<button class="btn" onclick="closeModal()">關閉</button>${s.status=="待發料"?`<button class="btn primary" onclick="closeModal();issueStore('${id}')">確認發料</button>`:s.status=="庫存不足"&&!s.linkedPr?`<button class="btn primary" onclick="closeModal();convertStoreToPr('${id}')">短缺轉 PR</button>`:""}`;$("modalBg").classList.add("open")}
    function issueStore(id,interactive=true){let s=state.storeReq.find(x=>x.id==id),it=getInv(s.line.sku),remaining=s.line.qty-s.line.issued;if(!s||!it)return;if(it[3]<remaining){s.line.shortage=remaining-it[3];s.status="庫存不足";save();render();if(interactive)toast(`${id} 可用庫存不足 ${s.line.shortage} ${s.line.uom}，請轉 PR`);return}it[3]-=remaining;s.line.issued=s.line.qty;s.line.shortage=0;s.status="已發料";let amount=remaining*it[6],debit=s.dept=="F&B"?"5201 餐飲原料耗用":s.dept=="Engineering"?"6104 工程維修耗材":"5101 客房備品耗用";addJournal(id,s.line.name+" 部門發料",debit,"1130 存貨",amount);let c=s.dept=="F&B"?state.cost[1]:s.dept=="Engineering"?state.cost[4]:state.cost[0];if(c)c[4]+=amount;save();render();if(interactive)toast(`${id} 已發料並過帳：借 ${debit}／貸存貨 ${money(amount)}`)}
    function convertStoreToPr(id){let s=state.storeReq.find(x=>x.id==id);if(!s)return;if(s.linkedPr){openPr(s.linkedPr);return}let it=getInv(s.line.sku),meta=deptMeta(it),r=createPr(it,Math.max(s.line.shortage,s.line.qty-s.line.issued),s.id,meta);s.linkedPr=r.id;save();render();toast(`${id} 的短缺量已轉為 ${r.id}`);openPr(r.id)}

    function openPr(id){let r=getPr(id);if(!r)return;let po=r.poId?getPo(r.poId):null;$("modalTitle").textContent=id+" · Purchase Requisition 請購單";$("modalSub").textContent=r.property+"｜"+r.dept+"｜"+r.costCenter;$("modalBody").innerHTML=`<div class="doc-summary"><div><span>申請人</span><strong>${r.requester}</strong></div><div><span>需求日期</span><strong>${r.needDate}</strong></div><div><span>預算科目</span><strong>${r.budget}</strong></div><div><span>目前狀態</span><strong>${st(r.status)}</strong></div></div><div class="alert">${r.purpose}<br>預算可用：${money(r.budgetAvailable)}｜優先級：${r.priority}</div>${table(["SKU","規格","現有／安全／在途","申請量","核准量","預估單價","預估金額"],[[r.item.sku,`${r.item.name}<br><span class="muted">${r.item.spec}</span>`,`${r.item.onHand}／${r.item.safety}／${r.item.onOrder} ${r.item.uom}`,r.item.qty+" "+r.item.uom,r.item.approvedQty+" "+r.item.uom,money(r.item.unitPrice),money(reqAmount(r))]])}<div><strong style="font-size:13px">簽核紀錄</strong>${approvalHtml(r)}</div><div><strong style="font-size:13px">關聯單據鏈</strong><div style="margin-top:8px">${relationChain(r)}</div></div>`;let action="";if(r.status=="待部門主管核准")action=`<button class="btn danger" onclick="closeModal();rejectPr('${id}')">退回補件</button><button class="btn primary" onclick="closeModal();approvePr('${id}')">核准並建立詢價</button>`;else if(r.status=="待比價")action=`<button class="btn primary" onclick="closeModal();openRfq('${r.rfqId}')">開啟比價表</button>`;else if(r.poId)action=`<button class="btn primary" onclick="closeModal();openPo('${r.poId}')">查看採購單</button>`;else if(r.invoiceId)action=`<button class="btn primary" onclick="closeModal();openInvoice('${r.invoiceId}')">查看發票比對</button>`;$("modalFoot").innerHTML=`<button class="btn" onclick="closeModal()">關閉</button>${action}`;$("modalBg").classList.add("open")}

    function openInvoiceEntry(poId){if(!isRole("finance"))return toast("請切換為財務人員");let p=getPo(poId);if(!p||p.received<=0)return;if(p.invoiceId)return openInvoice(p.invoiceId);showModal(`${poId} · 登錄供應商發票`,`${p.vendor}｜已收 ${p.received} ${p.uom}`,`<div class="doc-summary"><div><span>採購單金額</span><strong>${money(p.total)}</strong></div><div><span>驗收金額</span><strong>${money(p.received*p.unitPrice)}</strong></div><div><span>驗收單</span><strong>${p.grnIds.join("、")}</strong></div><div><span>付款條件</span><strong>${p.terms}</strong></div></div><div class="form-grid"><div class="field"><label for="invVendorNo">供應商發票號碼</label><input id="invVendorNo" placeholder="例如 AB12345678"></div><div class="field"><label for="invDate">發票日期</label><input id="invDate" type="date" value="2026-07-11"></div><div class="field"><label for="invQty">發票數量</label><input id="invQty" type="number" min="0" step="0.01" value="${p.received}"></div><div class="field"><label for="invAmount">含稅金額</label><input id="invAmount" type="number" min="0" value="${Math.round(p.received*p.unitPrice)}"></div><div class="field full"><label for="invAttachment">發票掃描檔</label><input id="invAttachment" type="file"></div><div class="field full"><label for="invNote">財務備註</label><textarea id="invNote">依供應商發票正本登錄，尚未執行三方比對。</textarea></div><label class="checkline full"><input id="invConfirm" type="checkbox"><span>我已核對供應商、發票號碼、日期、數量、金額及附件。</span></label></div>`,`<button class="btn" onclick="closeModal()">取消</button><button class="btn primary" onclick="commitInvoiceEntry('${poId}')">確認登錄發票</button>`)}
    function commitInvoiceEntry(poId){let p=getPo(poId),vendorInvoice=fieldValue("invVendorNo"),date=fieldValue("invDate"),qty=Number(fieldValue("invQty")),amount=Number(fieldValue("invAmount"));if(!$("invConfirm").checked)return toast("請先確認發票資料");if(!vendorInvoice||!date||qty<0||amount<=0)return toast("請完成發票號碼、日期、數量與金額");if(state.supplierInv.some(i=>i.vendorInvoice==vendorInvoice))return toast("供應商發票號碼已存在");let i={id:nextDocument("INV",state.supplierInv),vendorInvoice,poId:p.id,grnIds:[...p.grnIds],vendor:p.vendor,date,qty,amount,status:"待三方比對",variance:0,apId:"",note:fieldValue("invNote"),attachment:fileValue("invAttachment"),resolution:""};state.supplierInv.unshift(i);p.invoiceId=i.id;let r=p.prId?getPr(p.prId):null;if(r){r.invoiceId=i.id;r.status="已收貨待比對"}save();closeModal();render();toast(`${i.id} 已登錄，尚未形成應付帳款`);openInvoice(i.id)}
    function createInvoice(poId){openInvoiceEntry(poId)}

    function openInvoice(id){let i=getSupplierInv(id),p=i?getPo(i.poId):null;if(!i||!p)return;let expected=invoiceExpected(i,p),qtyDiff=i.qty-p.received,amtDiff=i.amount-expected,action="";if(isRole("finance")&&i.status=="待三方比對")action=`<button class="btn primary" onclick="closeModal();openMatchConfirmation('${id}')">開始三方比對</button>`;else if(isRole("finance")&&["數量差異","金額差異","待補貨"].includes(i.status))action=`<button class="btn primary" onclick="closeModal();openVarianceResolution('${id}')">登錄處理方式</button>`;else if(isRole("executive")&&i.status=="待財務主管核准")action=`<button class="btn primary" onclick="closeModal();openVarianceApproval('${id}')">主管覆核差異</button>`;else if(i.apId)action=`<button class="btn primary" onclick="closeModal();openDoc('ap','${i.apId}')">查看應付傳票</button>`;showModal(`${id} · 供應商發票`,`${i.vendor}｜發票號碼 ${i.vendorInvoice}`,`<div class="doc-summary"><div><span>採購單</span><strong>${p.id}</strong></div><div><span>驗收單</span><strong>${i.grnIds.join("、")}</strong></div><div><span>應付傳票</span><strong>${i.apId||"尚未建立"}</strong></div><div><span>比對狀態</span><strong>${st(i.status)}</strong></div></div>${table(["比對來源","數量","含稅單價","金額","差異"],[["採購單 PO",p.qty+" "+p.uom,money(p.unitPrice),money(p.total),""],["驗收單 GRN",p.received+" "+p.uom,money(p.unitPrice),money(expected),p.qty==p.received?st("正常"):st("有驗收差異")],["供應商發票",i.qty+" "+p.uom,money(i.qty?i.amount/i.qty:0),money(i.amount),(qtyDiff||amtDiff)?st(qtyDiff?"數量差異":"金額差異"):st("正常")]])}${qtyDiff||amtDiff?`<div class="alert bad">發票與實收差異：${qtyDiff} ${p.uom}，金額 ${money(amtDiff)}。付款維持凍結。</div>`:`<div class="alert">發票數量與驗收金額一致，可由財務確認比對。</div>`}<dl class="kv"><dt>發票日期</dt><dd>${i.date}</dd><dt>附件</dt><dd>${h(i.attachment||"未附")}</dd><dt>財務備註</dt><dd>${h(i.note||"無")}</dd><dt>處理紀錄</dt><dd>${h(i.resolution||"尚無")}</dd></dl>`,`<button class="btn" onclick="closeModal()">關閉</button>${action}`)}
    function openMatchConfirmation(id){let i=getSupplierInv(id),p=getPo(i.poId),expected=invoiceExpected(i,p);showModal(`${id} · 確認三方比對`,`${p.id}｜${i.grnIds.join("、")}｜${i.vendorInvoice}`,`<div class="doc-summary"><div><span>採購單</span><strong>${money(p.total)}</strong></div><div><span>驗收金額</span><strong>${money(expected)}</strong></div><div><span>發票金額</span><strong>${money(i.amount)}</strong></div><div><span>發票數量</span><strong>${i.qty} ${p.uom}</strong></div></div><label class="checkline"><input id="matchConfirm" type="checkbox"><span>我已查看採購單、驗收單及供應商發票正本，確認執行系統比對。</span></label>`,`<button class="btn" onclick="closeModal()">取消</button><button class="btn primary" onclick="commitMatchInvoice('${id}')">確認執行比對</button>`)}

    function openVarianceResolution(id){let i=getSupplierInv(id),p=getPo(i.poId);showModal(`${id} · 登錄差異處理`,`差異 ${money(i.variance||i.amount-invoiceExpected(i,p))}｜${i.vendor}`,`<div class="decision"><label><input type="radio" name="varianceAction" value="credit" checked><div><strong>要求折讓</strong><span>依實收數量調整發票，調整後重新三方比對。</span></div></label><label><input type="radio" name="varianceAction" value="replenish"><div><strong>要求供應商補貨</strong><span>保留原發票，付款持續凍結，等待補貨驗收。</span></div></label><label><input type="radio" name="varianceAction" value="accept"><div><strong>申請接受差異</strong><span>送財務主管覆核，核准後差異列採購差異費用。</span></div></label></div><div class="field"><label for="varianceNote">處理說明</label><textarea id="varianceNote" placeholder="請填寫聯絡供應商結果、折讓單或例外原因"></textarea></div>`,`<button class="btn" onclick="closeModal()">取消</button><button class="btn primary" onclick="commitVarianceResolution('${id}')">確認處理方式</button>`)}
    function commitVarianceResolution(id){let i=getSupplierInv(id),p=getPo(i.poId),action=document.querySelector('input[name="varianceAction"]:checked')?.value,note=fieldValue("varianceNote");if(!note)return toast("請填寫差異處理說明");if(action=="credit"){i.qty=p.received;i.amount=invoiceExpected(i,p);i.variance=0;i.status="待三方比對";i.resolution=`要求折讓：${note}`;let ap=i.apId?state.ap.find(a=>a[0]==i.apId):null;if(ap){ap[3]=i.amount;ap[5]="付款凍結"}}else if(action=="replenish"){i.status="待補貨";i.resolution=`供應商補貨：${note}`;ensureAp(i,p,"付款凍結")}else{i.status="待財務主管核准";i.resolution=`申請接受差異：${note}`;i.variance=i.amount-invoiceExpected(i,p);ensureAp(i,p,"付款凍結")}save();closeModal();render();toast(`${id} 已登錄處理方式`);openInvoice(id)}

    function openDoc(type,id){let x=(type=="ar"?state.ar:state.ap).find(a=>a[0]==id);if(!x)return;if(type=="ar"){let action=isRole("finance")&&x[7]!="已收款"?`<button class="btn primary" onclick="closeModal();openArReceipt('${id}')">登錄收款</button>`:"";showModal(`${id} · 應收帳款`,`VenueOS／企業月結／通路帳款`,`<dl class="kv"><dt>客戶</dt><dd>${h(x[1])}</dd><dt>來源</dt><dd>${h(x[2])}</dd><dt>金額</dt><dd>${money(x[3])}</dd><dt>發票</dt><dd>${h(x[6])}</dd><dt>到期日</dt><dd>${x[4]}</dd><dt>狀態</dt><dd>${st(x[7])}</dd></dl>`,`<button class="btn" onclick="closeModal()">關閉</button>${action}`);return}let i=state.supplierInv.find(v=>v.apId==id),j=state.journal.filter(v=>v.doc==id||v.doc=="PAY-"+id.slice(3)),action=isRole("finance")&&x[5]=="待付款"?`<button class="btn primary" onclick="closeModal();openPaymentApproval('${id}')">付款審核</button>`:"";showModal(`${id} · 應付傳票 AP`,`${x[1]}｜到期 ${x[4]}`,`<div class="doc-summary"><div><span>供應商</span><strong>${h(x[1])}</strong></div><div><span>金額</span><strong>${money(x[3])}</strong></div><div><span>到期日</span><strong>${x[4]}</strong></div><div><span>狀態</span><strong>${st(x[5])}</strong></div></div><div class="alert">${h(x[2])}</div>${i?`<div class="doc-chain"><button class="doc-link" onclick="closeModal();openPo('${i.poId}')">${i.poId}</button><b>→</b>${i.grnIds.map(g=>`<button class="doc-link" onclick="closeModal();openGrn('${g}')">${g}</button>`).join("")}<b>→</b><button class="doc-link" onclick="closeModal();openInvoice('${i.id}')">${i.vendorInvoice}</button><b>→</b><span class="doc-link">${id}</span></div>`:""}${j.length?table(["日期","摘要","借方","貸方","金額"],j.map(v=>[v.date,v.memo,v.debit,v.credit,money(v.amount)])):""} `,`<button class="btn" onclick="closeModal()">關閉</button>${action}`)}
    function openPaymentApproval(id){if(!isRole("finance"))return toast("請切換為財務人員");let x=state.ap.find(a=>a[0]==id);if(!x||x[5]!="待付款")return toast("目前單據不可付款");showModal(`${id} · 付款審核`,`${x[1]}｜${money(x[3])}`,`<div class="doc-summary"><div><span>到期日</span><strong>${x[4]}</strong></div><div><span>付款金額</span><strong>${money(x[3])}</strong></div><div><span>來源單據</span><strong>${h(x[2])}</strong></div><div><span>目前狀態</span><strong>${st(x[5])}</strong></div></div><div class="form-grid"><div class="field"><label for="paymentDate">付款日期</label><input id="paymentDate" type="date" value="2026-07-11"></div><div class="field"><label for="paymentBank">付款銀行</label><select id="paymentBank"><option>中國信託 012-8899</option><option>台灣銀行 004-3610</option></select></div><div class="field full"><label for="paymentNote">付款備註</label><textarea id="paymentNote">依付款排程及核准發票辦理。</textarea></div><label class="checkline full"><input id="paymentConfirm" type="checkbox"><span>我已確認供應商、來源單據、付款金額、到期日及銀行帳戶。</span></label></div>`,`<button class="btn" onclick="closeModal()">取消</button><button class="btn primary" onclick="commitPayment('${id}')">核准並過帳付款</button>`)}
    function commitPayment(id){if(!$("paymentConfirm").checked)return toast("請先確認付款資料");let x=state.ap.find(a=>a[0]==id);x[5]="已付款";state.paymentApprovals[id]={date:fieldValue("paymentDate"),bank:fieldValue("paymentBank"),note:fieldValue("paymentNote"),approver:actorName("finance")};let i=state.supplierInv.find(v=>v.apId==id);if(i){i.status="已付款";let p=getPo(i.poId),r=p&&p.prId?getPr(p.prId):null;if(r)r.status="已結案"}addJournal("PAY-"+id.slice(3),x[1]+" 供應商付款","2101 應付帳款","1102 銀行存款",x[3]);save();closeModal();render();toast(`${id} 已由 ${actorName("finance")} 核准付款`)}
    function payAp(id){openPaymentApproval(id)}
    function openArReceipt(id){let x=state.ar.find(a=>a[0]==id);showModal(`${id} · 登錄收款`,`${x[1]}｜${money(x[3])}`,`<div class="form-grid"><div class="field"><label for="receiptDate">入帳日期</label><input id="receiptDate" type="date" value="2026-07-11"></div><div class="field"><label for="receiptRef">銀行／通路參考號</label><input id="receiptRef" placeholder="匯款末五碼或平台批次號"></div><div class="field"><label for="receiptAmount">實收金額</label><input id="receiptAmount" type="number" value="${x[3]}"></div><div class="field full"><label for="receiptNote">收款備註</label><textarea id="receiptNote">依銀行或平台入帳明細登錄。</textarea></div><label class="checkline full"><input id="receiptConfirm" type="checkbox"><span>我已核對客戶、發票、入帳參考號及實收金額。</span></label></div>`,`<button class="btn" onclick="closeModal()">取消</button><button class="btn primary" onclick="commitArReceipt('${id}')">確認收款</button>`)}
    function commitArReceipt(id){let x=state.ar.find(a=>a[0]==id),amount=Number(fieldValue("receiptAmount"));if(!$("receiptConfirm").checked||!fieldValue("receiptRef")||amount<=0)return toast("請完成收款資料並確認");x[7]="已收款";if(x[6]=="待開立"||x[6]=="缺發票")x[6]="AB12990002";addJournal("RCPT-"+id.slice(3),x[1]+" 客戶收款","1102 銀行存款","1201 應收帳款",amount);state.documentNotes[id]=`${fieldValue("receiptDate")}｜${fieldValue("receiptRef")}｜${fieldValue("receiptNote")}`;save();closeModal();render();toast(`${id} 收款已確認過帳`)}
    function collectAr(id){openArReceipt(id)}
    function ar(){$("ar").innerHTML=`<div class="grid cols4">${metric("應收餘額",money(arAmt()),`${openAr()} 筆未結`,"warn")}${metric("逾期帳款",money(state.ar.filter(x=>x[7]=="逾期").reduce((s,x)=>s+x[3],0)),"需催款","bad")}${metric("待開票",state.ar.filter(x=>x[7]=="待開票"||x[6]=="缺發票").length+" 筆","缺發票或統編","warn")}${metric("已收款",money(state.ar.filter(x=>x[7]=="已收款").reduce((s,x)=>s+x[3],0)),"已回寫現金流","up")}</div><div class="card"><div class="head"><div><h2>通路與企業應收</h2><p>收款須登錄銀行／平台參考號及實收金額。</p></div></div>${table(["應收單號","客戶","來源","金額","到期日","狀態","操作"],state.ar.map(x=>{let action=`<button class="btn small" onclick="openDoc('ar','${x[0]}')">查看</button>`;if(isRole("finance")&&x[7]!="已收款")action+=` <button class="btn small primary" onclick="openArReceipt('${x[0]}')">登錄收款</button>`;return[x[0],x[1],x[2],money(x[3]),x[4],st(x[7]),action]}))}</div>`}
    function openNewPrForSku(sku){window.newPrSku=sku;openNewPr();window.newPrSku=""}
    function reqFrom(sku){if(!isRole("requester"))return toast("補貨建議需由部門申請人建立請購");openNewPrForSku(sku)}
    function inventory(){let rows=state.inv.map(x=>{let open=state.req.find(r=>r.item.sku==x[0]&&!['已結案','退回補件'].includes(r.status)),action=open?`<button class="btn small" onclick="openPr('${open.id}')">查看 ${open.id}</button>`:isRole("requester")&&["Housekeeping Supplies","Linen"].includes(x[2])?`<button class="btn small primary" onclick="openNewPrForSku('${x[0]}')">新增請購</button>`:"";return[x[0],x[1],x[2],x[3]+" "+x[5],x[4]+" "+x[5],onOrder(x[0])+" "+x[5],money(x[3]*x[6]),st(x[3]<x[4]?"需補貨":"正常"),action]});$("inventory").innerHTML=`<div class="grid cols4">${metric("庫存估值",money(invVal()),"資產負債表存貨","up","reports")}${metric("低安全庫存",low().length+" 項","依安全量與在途量判斷","bad")}${metric("已收貨未到發票",money(grirAmt()),"驗收已過帳、發票未登錄","warn","finance")}${metric("待驗收採購單",state.po.filter(p=>["待驗收","部分驗收"].includes(p.status)).length+" 張","由倉管辦理到貨驗收","warn","procure")}</div><div class="card"><div class="head"><div><h2>飯店多倉庫存</h2><p>中央倉、餐飲倉、Minibar 倉與工程倉。</p></div></div>${table(["SKU","品項","分類","現有","安全量","在途","庫存估值","狀態","操作"],rows)}</div>`}
    $("resetBtn").onclick=()=>{localStorage.removeItem(KEY);state=structuredClone(seed);hydrateDemo(state);window.procTab="work";window.reportTab="pl";save();render();toast("Demo 資料已重設")};
    $("closeModal").onclick=closeModal;
    $("modalBg").onclick=e=>{if(e.target==e.currentTarget)closeModal()};
    document.addEventListener("keydown",e=>{if(e.key=="Escape")closeModal()});
    render();
  </script>
</body>
</html>
